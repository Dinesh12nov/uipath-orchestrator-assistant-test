<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UiPath Support Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0b1f3a;
    --navy-light: #16305a;
    --orange: #fa4616;
    --bg: #eef0f4;
    --card: #ffffff;
    --border: #dfe3ea;
    --text: #1c2430;
    --muted: #6b7482;
    --green: #1a8a5f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }

  #app { display: flex; height: 100vh; }
  #main {
    background:
      radial-gradient(circle at 100% 0%, rgba(250,70,22,0.05) 0%, rgba(250,70,22,0) 45%),
      radial-gradient(circle at 0% 100%, rgba(11,31,58,0.04) 0%, rgba(11,31,58,0) 40%),
      var(--bg);
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 280px; flex-shrink: 0; color: white; position: relative;
    background:
      radial-gradient(circle at 15% 0%, rgba(250,70,22,0.16) 0%, rgba(250,70,22,0) 40%),
      linear-gradient(165deg, #14161c 0%, #1c1f27 55%, #10121a 100%);
    display: flex; flex-direction: column; padding: 20px 16px;
    box-shadow: 2px 0 18px rgba(0,0,0,0.35);
  }
  #sidebar::after {
    content: ""; position: absolute; top: 0; right: 0; width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--orange) 0%, rgba(250,70,22,0.1) 100%);
  }
  #sidebar .brand { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 22px; }
  #sidebar .brand .logo {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--orange), #ff8a5c); flex-shrink: 0;
    display:flex; align-items:center; justify-content:center; font-size:17px;
    box-shadow: 0 3px 12px rgba(250,70,22,0.45);
  }
  #sidebar .brand h1 { font-size: 15px; margin: 0 0 2px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.25; }
  #sidebar .brand .sub { font-size: 11px; color: #a9b3c9; line-height: 1.3; }

  #progressList { list-style: none; margin: 0; padding: 0; flex: 1; overflow-y: auto; }
  #progressList li { display: flex; gap: 9px; padding: 9px 4px; border-left: 2px solid rgba(255,255,255,0.12); margin-left: 6px; padding-left: 12px; position: relative; transition: border-color 0.2s ease; }
  #progressList li.current { border-left-color: var(--orange); }
  #progressList li .tick { width: 16px; height:16px; border-radius: 50%; background: rgba(255,255,255,0.12); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size: 10px; margin-top:1px; transition: background 0.2s ease; }
  #progressList li.current .tick { background: var(--orange); box-shadow: 0 0 0 3px rgba(250,70,22,0.22); }
  #progressList li .txt { font-size: 12px; line-height: 1.35; }
  #progressList li .q { color: #9aa5bd; display:block; }
  #progressList li .a { color: white; font-weight: 600; }
  #progressList .empty { font-size: 12px; color: #8b96ad; padding: 4px 12px; }

  #restartBtn {
    margin-top: 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.22);
    color: white; border-radius: 8px; padding: 10px; font-size: 12.5px; cursor: pointer; font-weight: 600;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  #restartBtn:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }

  #freshness { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.14); }
  .fresh-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
  }
  #freshness .fresh-row { display:flex; align-items:center; gap: 7px; font-size: 11.5px; color: #cfd6e8; }
  #freshness .fresh-row + .fresh-row { margin-top: 7px; }
  #freshness .fresh-dot { width: 7px; height: 7px; border-radius: 50%; background: #3ddc84; flex-shrink:0; box-shadow: 0 0 0 3px rgba(61,220,132,0.15); animation: pulseDot 2.2s ease-in-out infinite; }
  #freshness .fresh-icon { width: 13px; text-align:center; flex-shrink:0; font-size: 11px; }
  @keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 3px rgba(61,220,132,0.15); } 50% { box-shadow: 0 0 0 5px rgba(61,220,132,0.25); } }
  /* ---------- Main ---------- */
  #main { flex: 1; overflow-y: auto; padding: 36px 44px; display: flex; justify-content: center; }
  #mainInner { max-width: 760px; width: 100%; }

  .question-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px 34px;
    box-shadow: 0 4px 26px rgba(11,31,58,0.09), 0 1px 3px rgba(11,31,58,0.05); position: relative; overflow: hidden;
    animation: cardIn 0.4s ease;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .question-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--orange), #ffb199, var(--orange));
    background-size: 200% 100%; animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }
  .question-card .kicker { display: flex; align-items: center; justify-content: space-between; gap: 9px; margin-bottom: 16px; }
  .question-card .kicker .kicker-left { display: flex; align-items: center; gap: 9px; }
  .question-card .kicker .step-num {
    width: 23px; height: 23px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--orange), #ff8a5c); color: white;
    font-size: 11.5px; font-weight: 800; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 7px rgba(250,70,22,0.4);
  }
  .question-card .kicker .step-text { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 700; }
  .question-card h2 { font-size: 21px; margin: 0 0 22px; line-height: 1.35; color: var(--navy); font-weight: 800; letter-spacing: -0.01em; }

  .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .opt-grid.single { grid-template-columns: 1fr; }
  .opt-card {
    display: flex; align-items: center; gap: 13px; text-align: left;
    background: #fafbfc; border: 1.5px solid var(--border); border-radius: 12px;
    padding: 15px 16px; font-size: 13.5px; font-weight: 600; color: var(--navy); cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    position: relative; opacity: 0; animation: optIn 0.4s ease forwards;
  }
  .opt-card:nth-child(1) { animation-delay: 0.03s; }
  .opt-card:nth-child(2) { animation-delay: 0.07s; }
  .opt-card:nth-child(3) { animation-delay: 0.11s; }
  .opt-card:nth-child(4) { animation-delay: 0.15s; }
  .opt-card:nth-child(5) { animation-delay: 0.19s; }
  .opt-card:nth-child(6) { animation-delay: 0.23s; }
  @keyframes optIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
  .opt-card .ic-badge {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, #eef1f8, #e4e9f5); display: flex; align-items: center; justify-content: center;
    transition: background 0.18s ease;
  }
  .opt-card .ic-badge svg { stroke: var(--navy); transition: stroke 0.18s ease; }
  .opt-card .opt-label { flex: 1; }
  .opt-card .arrow {
    margin-left: auto; opacity: 0; transform: translateX(-4px); flex-shrink: 0; font-weight: 700; color: var(--orange);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .opt-card:hover {
    border-color: var(--orange); background: #fff6f2; color: var(--orange);
    transform: translateY(-3px); box-shadow: 0 10px 24px rgba(250,70,22,0.18);
  }
  .opt-card:hover .ic-badge { background: linear-gradient(135deg, var(--orange), #ff8a5c); }
  .opt-card:hover .ic-badge svg { stroke: #ffffff; }
  .opt-card:hover .arrow { opacity: 1; transform: translateX(0); }
  .opt-card.selected { border-color: var(--orange); background: #fff6f2; color: var(--orange); box-shadow: 0 6px 16px rgba(250,70,22,0.15); }
  .opt-card.selected .ic-badge { background: linear-gradient(135deg, var(--orange), #ff8a5c); }
  .opt-card.selected .ic-badge svg { stroke: #ffffff; }
  .field-row input[type=text] {
    width: 100%; padding: 11px 13px; border-radius: 9px; border: 1.5px solid var(--border); font-size: 14px; font-family: inherit; background: #fafbfc;
  }

  .other-row-label { font-size: 11.5px; color: var(--muted); margin: 16px 0 7px; font-weight: 600; }
  .other-row { display: flex; align-items: center; gap: 8px; }
  .other-row input[type=text] {
    flex: 1; padding: 11px 15px; border-radius: 100px; border: 1.5px solid var(--border);
    font-size: 13.5px; font-family: inherit; background: #fafbfc;
  }
  .other-row input[type=text]:focus { outline: none; border-color: var(--orange); background: #fff; }
  .other-send {
    width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--navy); color: white;
    font-size: 15px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .other-send:hover { background: var(--orange); }

  .field-row select, .field-row textarea {
    width: 100%; padding: 11px 13px; border-radius: 9px; border: 1.5px solid var(--border); font-size: 14px; font-family: inherit; background: #fafbfc;
  }
  .field-row textarea { resize: vertical; min-height: 70px; }
  .go-btn {
    background: linear-gradient(135deg, var(--orange), #ff8a5c); color: white; border: none; border-radius: 9px;
    padding: 11px 20px; font-size: 13.5px; font-weight: 700; cursor: pointer; margin-top: 12px;
    box-shadow: 0 3px 10px rgba(250,70,22,0.25); transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .go-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(250,70,22,0.35); }
  .back-link { display: inline-block; flex-shrink: 0; margin-top: 0; background: none; border: none; color: var(--muted); font-size: 12.5px; cursor: pointer; text-decoration: underline; padding: 0; }

  /* ---------- Result card ---------- */
  .result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .result-header .ic { font-size: 26px; }
  .result-header h2 { font-size: 20px; margin: 0; color: var(--navy); }
  .result-header .back-link.result-back { margin-left: auto; flex-shrink: 0; }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
  .chip {
    background: linear-gradient(135deg, #eef1f8, #e4e9f5); border: 1px solid #d7dded; color: var(--navy);
    font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 100px;
  }

  .warn { background: #fff3ec; border: 1px solid #ffd7bd; color: #8a3a12; padding: 10px 13px; border-radius: 9px; font-size: 13px; margin-bottom: 14px; }

  .field-error { background: #fdeceb; border: 1px solid #f5b8b3; color: #9a2c22; padding: 10px 13px; border-radius: 9px; font-size: 13px; margin-top: 10px; }

  .action-bar { display: flex; gap: 8px; margin-bottom: 20px; }
  .action-btn {
    background: var(--card); border: 1.5px solid var(--border); color: var(--navy); border-radius: 8px;
    padding: 8px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .action-btn:hover { border-color: var(--navy); transform: translateY(-1px); box-shadow: 0 4px 10px rgba(11,31,58,0.10); }
  .action-btn.primary { background: var(--navy); color: white; border-color: var(--navy); }
  .action-btn.primary:hover { background: var(--navy-light); box-shadow: 0 4px 12px rgba(11,31,58,0.28); }

  .file-block { margin-bottom: 6px; }
  .file-block > h3.file-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 22px 0 8px; }

  details.section {
    background: var(--card); border: 1px solid var(--border); border-radius: 11px; margin-bottom: 10px; overflow: hidden;
  }
  details.section > summary {
    list-style: none; cursor: pointer; padding: 13px 16px; font-size: 14px; font-weight: 700; color: var(--navy);
    display: flex; align-items: center; gap: 9px; user-select: none;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary .chevron { margin-left: auto; color: var(--muted); font-size: 12px; transition: transform 0.15s; }
  details.section[open] > summary .chevron { transform: rotate(90deg); }
  details.section > summary .badge { background: #eef1f8; color: var(--navy); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; margin-left: 6px; }
  .section-body { padding: 4px 18px 16px 44px; font-size: 13.5px; line-height: 1.55; }
  .section-body h1, .section-body h2, .section-body h3 { color: var(--navy); }
  .section-body h3 { font-size: 13.5px; margin: 14px 0 6px; }
  .section-body p { margin: 6px 0; }
  .section-body ul, .section-body ol { margin: 6px 0; padding-left: 20px; }
  .section-body li { margin: 4px 0; }
  .section-body code { background: #eef0f4; padding: 1px 5px; border-radius: 4px; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; }
  .section-body pre { background: #101828; color: #e8ecf3; padding: 10px 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; margin: 8px 0; }
  .section-body pre code { background: none; padding: 0; color: inherit; }
  .section-body table { border-collapse: collapse; margin: 8px 0; font-size: 12.5px; width: 100%; }
  .section-body th, .section-body td { border: 1px solid var(--border); padding: 5px 8px; text-align: left; }
  .section-body th { background: #f0f2f6; }
  .section-body strong { font-weight: 700; }

  ul.chklist { list-style: none; padding-left: 0 !important; }
  ul.chklist li.chk { margin: 6px 0; }
  ul.chklist label { display: flex; align-items: flex-start; gap: 9px; cursor: pointer; }
  ul.chklist input[type=checkbox] { margin-top: 3px; width: 15px; height: 15px; accent-color: var(--orange); flex-shrink: 0; }
  ul.chklist label.done span { text-decoration: line-through; color: var(--muted); }

  .empty-hint { text-align: center; color: var(--muted); font-size: 13px; padding: 60px 20px; }

  @media (max-width: 760px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; flex-direction: row; align-items: center; gap: 14px; padding: 12px 16px; }
    #sidebar .brand { margin-bottom: 0; }
    #progressList { display: none; }
    #restartBtn { margin-top: 0; }
    #main { padding: 20px; }
    .opt-grid { grid-template-columns: 1fr; }
  }

  @media print {
    #sidebar, .action-bar, .back-link { display: none !important; }
    #main { padding: 0; }
    details.section { break-inside: avoid; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="12" cy="3" r="1.3" fill="white"/>
          <line x1="12" y1="4.3" x2="12" y2="6.4" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
          <rect x="5" y="6.4" width="14" height="11" rx="4" stroke="white" stroke-width="1.6"/>
          <circle cx="9.5" cy="11.9" r="1.25" fill="white"/>
          <circle cx="14.5" cy="11.9" r="1.25" fill="white"/>
          <line x1="2.6" y1="9.8" x2="2.6" y2="14" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="21.4" y1="9.8" x2="21.4" y2="14" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>UiPath Support Assistant</h1>
        <div class="sub">Interactive intake wizard</div>
      </div>
    </div>
    <ul id="progressList"><li class="empty">Your steps will appear here</li></ul>
    <button id="restartBtn">⟲ Start over</button>
    <div id="freshness">
      <div class="fresh-card">
        <div class="fresh-row"><span class="fresh-icon">🕒</span><span id="updatedText">Updated —</span></div>
        <div class="fresh-row"><span class="fresh-dot"></span><span id="freshText">Last verified —</span></div>
      </div>
    </div>
  </div>
  <div id="main"><div id="mainInner"></div></div>
</div>

<script>
const MD = {
  install: "# Standalone Orchestrator \u2014 Fresh Install Guide\n\n## Scope\nNew installation of UiPath Orchestrator (Standalone Server) on a Windows Server VM.\nCovers single-node and multi-node (HA) deployments.\n\n---\n\n## Pre-flight Checklist\n\nBefore starting the installation, confirm ALL of the following:\n\n| Check | Requirement |\n|---|---|\n| OS | Windows Server 2016 / 2019 / 2022 (64-bit) \ud83d\udcd6 [Software Requirements](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-software-requirements) |\n| RAM / CPU / Disk | Sizing varies significantly by deployment size \u2014 do not rely on a single flat minimum. Dev/small production (<20 robots) starts around 4 CPU cores / 4 GB RAM / 100\u2013150 GB disk for the web app server; large multi-node deployments need 16+ cores / 32+ GB RAM / SSD storage. Size per the official tables for your robot count. \ud83d\udcd6 [Hardware Requirements](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-hardware-requirements) |\n| .NET / ASP.NET Core | ASP.NET Core Hosting Bundle 6.0.x or 8.0.x. Only the Core module is required (no runtime) \u2014 install with `OPT_NO_RUNTIME=1` unless Test Manager is also needed. \ud83d\udcd6 [Software Requirements](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-software-requirements) |\n| IIS | IIS 10+ with URL Rewrite 2.1+ module; required role services enabled (see Phase 1) \ud83d\udcd6 [Software Requirements](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-software-requirements) |\n| SQL Server | SQL Server 2014 / 2016 / 2017 / 2019 / 2022 (Standard or Enterprise), or Azure SQL Database / Amazon RDS for SQL Server / Google Cloud SQL for SQL Server \ud83d\udcd6 [Software Requirements](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-software-requirements) |\n| SQL Account | `dbcreator` server role, granted **before** installing, if Orchestrator is to create the database. If that's restricted, pre-create an empty database and grant `db_owner` (or the granular `db_datareader` + `db_datawriter` + `db_ddladmin` + `EXECUTE ON SCHEMA::dbo`) instead. `sysadmin` is **not** a documented requirement. \ud83d\udcd6 [Prerequisites for Installation](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation) |\n| SSL Certificate | Valid certificate for the Orchestrator FQDN (not self-signed for prod). Identity Server's signing certificate additionally needs a \u22652048-bit key, a private key accessible by the AppPool user, and must not be expired. \ud83d\udcd6 [Prerequisites for Installation](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation) |\n| Firewall | Port 443 open inbound (Users/Robots \u2194 Orchestrator); 1433 open to SQL Server. (9200/9300 for Elasticsearch, 5601 for Kibana, if used.) \ud83d\udcd6 [Hardware Requirements \u2014 TCP Ports](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-hardware-requirements) |\n| Admin rights | Local Administrator on the install server; the account running the installer must also be a **Domain User**. \ud83d\udcd6 [Prerequisites for Installation](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation) |\n| License | Valid `.license` file or online activation key ready |\n\n---\n\n## Step-by-Step Install Checklist\n\n### Phase 1 \u2014 Prepare the Server\n\n- [ ] **1.1** Install IIS with the following role services. This is exactly the list UiPath's own `InstallRolesAndFeatures.ps1` script installs:\n  ```\n  Web Server \u2192 Common HTTP Features: Default Document, HTTP Errors, Static Content\n  Web Server \u2192 Security: Request Filtering, URL Authorization, Windows Authentication\n  Web Server \u2192 Application Development: ASP.NET 4.5, .NET Extensibility 4.5, Application Initialization,\n                                         ISAPI Extensions, ISAPI Filters, WebSockets\n                                         (Windows Server 2019 ships with ASP.NET 4.7 / .NET Extensibility 4.7\n                                          by default \u2014 that satisfies the requirement)\n  Management Tools: IIS Management Console\n  Features (outside the Web Server role): Client for NFS\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/server-roles-and-features\n\n  Rather than hand-typing an `Install-WindowsFeature` command, use UiPath's bundled script, which installs exactly the roles/features above automatically (referenced directly from the official prerequisites page):\n  ```\n  https://raw.githubusercontent.com/UiPath/Infrastructure/master/Setup/InstallRolesAndFeatures.ps1\n  ```\n  Run `IISRESET` after installing.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation\n\n- [ ] **1.2** Install the ASP.NET Core Hosting Bundle (download from Microsoft):\n  ```\n  https://dotnet.microsoft.com/en-us/download/dotnet/6.0  (ASP.NET Core Module 6.0.x)\n  https://dotnet.microsoft.com/en-us/download/dotnet/8.0  (ASP.NET Core Module 8.0.x)\n  ```\n  Only the Core module needs to be installed \u2014 run the Hosting Bundle installer from an elevated command line with `OPT_NO_RUNTIME=1` (omit this flag only if you also plan to install Test Manager). Run `IISRESET` after installing.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-software-requirements\n\n- [ ] **1.3** Import SSL certificate into the Windows Certificate Store:\n  ```\n  certlm.msc \u2192 Personal \u2192 Certificates \u2192 Import (.pfx file)\n  Note the thumbprint or Subject \u2014 needed later\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/certificate-considerations\n\n- [ ] **1.4** Prepare SQL Server:\n  - Create a dedicated SQL login for Orchestrator (SQL Auth or Windows Auth); make sure its **Default Language is set to English** \u2014 otherwise the site fails to start with a \"conversion of a varchar data type to a datetime data type\" error.\n  - Grant the `dbcreator` server role **before** installing if you want the installer to create the database. If policy doesn't allow `dbcreator`, pre-create the empty database yourself and grant the login `db_owner` (or the granular `db_datareader` + `db_datawriter` + `db_ddladmin` + `EXECUTE ON SCHEMA::dbo`) \u2014 `db_ddladmin` is only needed for install/upgrade and can be revoked afterward.\n  - Confirm collation is `Latin1_General_CI_AS`; `READ_COMMITTED_SNAPSHOT` is set automatically for a newly created database.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation\n\n### Phase 2 \u2014 Run the Installer\n\n- [ ] **2.1** Download the correct Orchestrator MSI (`UiPathOrchestrator.msi`) from the UiPath Customer Portal\n- [ ] **2.2** Right-click MSI \u2192 Run as Administrator\n- [ ] **2.3** Accept the license agreement\n- [ ] **2.4** On the **Product Features** step, choose whether to also install the optional **Insights** and/or **Test Automation** features.\n  Note: Orchestrator, Identity Server, Webhooks, and the Resource Catalog Service are **not** separately selectable checkboxes \u2014 all four are always installed together as the base product's \"included services.\" Only Insights and Test Automation are optional add-ons.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n- [ ] **2.5** On the **Orchestrator Database Settings** step, configure:\n  - SQL Server Host: `<server>\\<instance>` (default `.` for localhost) or `<server>,<port>` for a custom port\n  - Database Name: default `UiPath` (some special characters and names over 123 characters are not supported)\n  - Authentication mode: Windows Integrated Authentication (default) or SQL Server Authentication\n  - Clicking **Next** triggers the installer to validate the SQL connection automatically; a dialog appears if it fails\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n- [ ] **2.6** On the **Orchestrator IIS Settings** step, configure:\n  - Website name: fixed to `UiPath Orchestrator` (not editable)\n  - Website Port: default `443` (HTTPS)\n  - Add firewall rules for this port: optional checkbox to auto-add the rule\n  - SSL certificate: Subject or Thumbprint of the certificate to secure the site\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n- [ ] **2.7** On the **Identity Server Settings** step, set the **Orchestrator Public URL** \u2014 the FQDN users/robots will use, e.g. `https://orchestrator.company.com`. Defaults to `https://<hostname>` (or `https://<hostname>:<port>` for a non-443 port).\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n- [ ] **2.8** Click **Install** on the **Ready to install** step. Orchestrator installs to `C:\\Program Files (x86)\\UiPath\\Orchestrator` by default \u2014 the install path cannot be changed after the fact. No fixed install duration is documented; it varies with server specs.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n- [ ] **2.9** In IIS Manager, select the Orchestrator server node \u2192 **Feature Delegation** \u2192 right-click **Authentication - Windows** \u2192 set to **Read/Write**. Then start the website.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n\n### Phase 3 \u2014 Post-Install Configuration\n\n- [ ] **3.1** Verify IIS Application Pools are running:\n  ```\n  IIS Manager \u2192 Application Pools\n  \u2192 UiPath Orchestrator (Running) \u2014 this app pool name is fixed by the installer\n  \u2192 Identity Server, Webhooks, and Resource Catalog each get their own app pool \u2014 verify all are Started\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n\n- [ ] **3.2** Verify the Identity Server signing certificate meets requirements (\u22652048-bit key, private key accessible by the AppPool user, not expired) and that its thumbprint is set correctly:\n  ```\n  C:\\Program Files (x86)\\UiPath\\Orchestrator\\Identity\\appsettings.Production.json\n  \u2192 \"SigningCredential\" section\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-is-appsettings-json\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation\n\n- [ ] **3.3** Run the Platform Configuration Tool to validate setup:\n  ```powershell\n  cd \"C:\\Program Files (x86)\\UiPath\\Orchestrator\\Tools\\PlatformConfiguration\"\n  .\\Platform.Configuration.Tool.ps1 -Readiness -SiteName \"UiPath Orchestrator\"\n  ```\n  If PowerShell blocks the script as unsigned, run `Set-ExecutionPolicy -ExecutionPolicy Unrestricted` (permanent) or `powershell.exe Set-ExecutionPolicy Bypass` (single session) first.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/platform-configuration-tool\n\n- [ ] **3.4** Access Orchestrator in browser: `https://<your-fqdn>`\n  - Host admin credentials are set during the **Orchestrator Authentication Settings** install step (Host password / Confirm password). Log in with Tenant Name `host`.\n  - Create first Tenant\n  - Activate license\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n\n- [ ] **3.5** Check Windows Event Viewer for errors:\n  ```\n  Windows Logs \u2192 Application\n  Look for Level=Error, Source=.NET Runtime, followed by Source=IIS AspNetCore Module V2 entries\n  \u2014 this pattern indicates an ASP.NET Core startup failure (HTTP 500.30)\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/troubleshooting-http-error-50030-aspnet-core-app-failed-to-start\n\n---\n\n## Validation Checklist\n\n- [ ] Orchestrator portal loads without errors\n- [ ] Host admin login works\n- [ ] Tenant creation succeeds\n- [ ] License activated and seat counts correct\n- [ ] Robot can connect (test with UiPath Assistant \u2192 Machine Key)\n- [ ] Event Viewer: no critical errors in Application log\n- [ ] Identity Server health: `https://<fqdn>/identity/.well-known/openid-configuration` returns JSON (note: path is `/identity`, not `/identity_`)\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-installation-troubleshooting\n\n---\n\n## Common Install Errors & Fixes\n\n| Error | Cause | Fix |\n|---|---|---|\n| Database creation fails during install | SQL login lacks the `dbcreator` server role before install | Grant `dbcreator` at the server level before installing, or pre-create the DB and grant `db_owner` / the granular db-level roles instead \ud83d\udcd6 [Prerequisites](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation) |\n| \"The Remote Certificate Is Invalid\" | Certificate's public key not imported, or not placed in the Trusted Root Certification Authorities store of the local machine | Import the certificate's public key into Trusted Root CAs on the Orchestrator machine \ud83d\udcd6 [Troubleshooting](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-installation-troubleshooting) |\n| \"Invalid Identity Access Token Authentication Options. Please Check Web.config\" | Identity Server wasn't installed alongside Orchestrator (commonly seen with the Azure App Service install script) | Install Identity Server together with Orchestrator \u2014 Orchestrator does not work without it \ud83d\udcd6 [Troubleshooting](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-installation-troubleshooting) |\n| \"Too Many Redirects\" | Three documented causes: (1) Identity Server SSL cert doesn't match the Orchestrator/IS URL; (2) ASP.NET Core Hosting Bundle installed incorrectly \u2014 check `https://localhost/identity`, a `500.19 Error Code: 0x8007000d` means a missing/malformed web.config; (3) **Host name** (IIS Settings step) and **Orchestrator Public URL** (Identity Server Settings step) didn't match during install | Match the cert to the URL; reinstall the Hosting Bundle if 500.19 appears; if URLs already diverged, update `IdentityServer.Integration.Authority` in `UiPath.Orchestrator.dll.config` and the `[identity].[ClientRedirectUris]` table, then run `IISReset` \ud83d\udcd6 [Troubleshooting](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-installation-troubleshooting) |\n| HTTP Error 500.30 \u2014 \"ASP.NET Core app failed to start\" | ASP.NET Core Module couldn't start the .NET Core CLR in-process | Check Windows Event Viewer for `Level=Error`, `Source=.NET Runtime`, followed by `Source=IIS AspNetCore Module V2` entries, and the ASP.NET Core Module `stdout` log \ud83d\udcd6 [500.30 Troubleshooting](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/troubleshooting-http-error-50030-aspnet-core-app-failed-to-start) |\n| Resource Catalog app pool not created automatically (on upgrade) | Automatic app-pool provisioning for Resource Catalog failed | Re-run the installer from the command line with `APPPOOL_USER_NAME` / `APPPOOL_PASSWORD` specified \ud83d\udcd6 [Troubleshooting](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-installation-troubleshooting) |\n| Unable to connect to SQL Server | Wrong connection string, closed firewall port, or SQL not listening on a fixed port | Confirm port 1433 (or custom port) is open, TCP protocol is enabled in SQL Server Configuration Manager, and the service listens on a fixed (not dynamic) port; test connectivity with SSMS from the install server \ud83d\udcd6 [Prerequisites](https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation) |\n\n---\n\n## Reference Links\n\n- Hardware Requirements: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-hardware-requirements\n- Software Requirements: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-software-requirements\n- Prerequisites for Installation: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-prerequisites-for-installation\n- Server Roles and Features: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/server-roles-and-features\n- The Windows Installer: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-the-windows-installer\n- Platform Configuration Tool: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/platform-configuration-tool\n- Installation Troubleshooting: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-installation-troubleshooting\n- HTTP 500.30 Troubleshooting: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/troubleshooting-http-error-50030-aspnet-core-app-failed-to-start\n",
  upgrade: "# Standalone Orchestrator \u2014 Upgrade Guide\n\n## Scope\nUpgrading an existing Standalone Orchestrator installation to a newer version.\nThe Pre-Upgrade Checklist, Step-by-Step Upgrade Checklist, SQL Maintenance, and Common Errors\nsections below apply to **both** upgrade modes. What actually differs between the two modes is\ncovered immediately below, before those shared sections.\n\n---\n\n## In-Place vs. Side-by-Side \u2014 What Actually Differs\n\n### In-place (same server)\nThis is **UiPath's only officially documented Standalone upgrade method**. You run the target\nversion's `UiPathOrchestrator.msi` directly on the existing server; the installer detects the\nexisting install, upgrades the binaries in place (keeping a backup folder of the old version),\nand migrates the database in place. Everything in the Step-by-Step Upgrade Checklist below\n(Phases 1\u20133) describes this path exactly as UiPath documents it \u2014 no adjustment needed.\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/about-updating-and-migrating\n\n### Side-by-side (new server)\n**Important:** unlike Automation Suite (which has an official, separately documented\n\"side-by-side upgrade\" procedure), UiPath does **not** publish a distinct side-by-side upgrade\nprocedure for Standalone Orchestrator. For Standalone, \"side-by-side\" is a customer/PSE-driven\npattern assembled from the same documented primitives above \u2014 not a separate blessed procedure.\nIn practice:\n\n- [ ] Provision the new server to meet the **target** version's hardware/software requirements\n  (not the current version's).\n- [ ] Install the **target** version fresh on the new server via the Windows Installer. Per\n  UiPath's own documentation on the database step: *\"if the database you point to does not\n  exist, it is automatically created... If you point to an existing database, it is updated\n  during the same process.\"* So pointing the new server's installer at a copy (or, during the\n  actual cutover, the live copy) of the existing Orchestrator database triggers the same schema\n  migration an in-place upgrade would \u2014 just run from a different application server.\n- [ ] Do a dry run first: restore a **copy** of the production database to a test SQL instance,\n  point the new server's installer at that copy, and validate the upgrade succeeds before\n  touching production.\n- [ ] For the real cutover, only **one** server may point at the production database at a time \u2014\n  never run the old server and the new server against the same database concurrently.\n- [ ] Decide explicitly how the URL/hostname will move: either re-point DNS/load balancer so the\n  new server answers on the **same** Orchestrator URL (simplest for Robots/Studio \u2014 no\n  reconfiguration needed on the client side), or cut over to a **new** URL, in which case you\n  must update the Identity Server redirect URIs in the database:\n  ```sql\n  DECLARE @CurrentServerName NVARCHAR(255) = 'server1';\n  DECLARE @NewServerName NVARCHAR(255) = 'server2';\n\n  UPDATE [identity].[ClientRedirectUris]\n  SET [RedirectUri] = REPLACE([RedirectUri], @CurrentServerName, @NewServerName)\n  WHERE [RedirectUri] LIKE '%' + @CurrentServerName + '%';\n\n  UPDATE [identity].[ClientPostLogoutRedirectUris]\n  SET [PostLogoutRedirectUri] = REPLACE([PostLogoutRedirectUri], @CurrentServerName, @NewServerName)\n  WHERE [PostLogoutRedirectUri] LIKE '%' + @CurrentServerName + '%';\n  ```\n  and confirm `IdentityServer.Integration.Authority` in the new server's\n  `UiPath.Orchestrator.dll.config` points at the correct Identity Server address.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/changing-the-orchestrator-identity-server-url\n- [ ] Re-point the SSL certificate and re-verify the thumbprint on the new server (see Phase 3\n  post-upgrade checks below).\n- [ ] Validate end-to-end on the new server (login, Robot connectivity, a test job) **before**\n  decommissioning the old one \u2014 don't tear down the old server until the new one is proven.\n- [ ] The \"what rollback actually means\" caveat below (DB migrations aren't reversible by\n  reinstalling an old MSI) still applies \u2014 your rollback plan for a side-by-side cutover is\n  keeping the old server intact and simply re-pointing DNS/clients back to it, not \"undo\" the\n  new server's DB migration.\n\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/about-updating-and-migrating (see \"Database\" under Update Considerations)\n\n---\n\n## Upgrade Path Rules (CRITICAL)\n\n**Never skip LTS versions.** Always upgrade through the LTS chain:\n\n```\n2021.10 \u2192 2022.10 \u2192 2023.10 \u2192 2024.10   \u2705 Correct\n2021.10 \u2192 2024.10                          \u274c Not supported\n2022.4  \u2192 2023.4  \u2192 2024.10               \u2705 Correct\n```\n\n**Robot/Studio compatibility with the upgraded Orchestrator:**\n- For **Standalone Orchestrator**, UiPath's own compatibility matrix shows full cross-compatibility \u2014\n  every Robot version from 2021.10 through the latest release is compatible with every Standalone\n  Orchestrator version in that matrix. There is **no forced Robot/Studio version bump** just because\n  Orchestrator was upgraded, and no \"1 version behind / can't be ahead\" rule for Standalone.\n  Recommended order is still: upgrade Orchestrator first, then Robots, and reconnect Robots to\n  Orchestrator afterward \u2014 but that's a practical recommendation, not a hard compatibility requirement.\n- **Studio and Robot must match each other's version** when installed on the same machine\n  (e.g. Studio 2023.10.x needs Robot 2023.10.x on that box) \u2014 this is independent of the\n  Orchestrator version.\n- This full cross-compatibility is a **Standalone-only** rule. Automation Cloud is different \u2014 it\n  only guarantees backward compatibility with the **three latest enterprise Robot/Studio releases**;\n  anything older is unsupported there and must be upgraded regardless of the Orchestrator side.\n\n\ud83d\udcd6 https://docs.uipath.com/robot/standalone/latest/admin-guide/about-backward-and-forward-compatibility\n\ud83d\udcd6 Before relying on this for a specific pair of versions, also confirm against the official upgrade-path guidance for the target release: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/about-updating-and-migrating\n\n---\n\n## Pre-Upgrade Checklist\n\n### Official steps (per UiPath's \"Before you upgrade\" guide)\n\n- [ ] **Only relevant if your CURRENT version predates 2023.10: confirm no Classic folders/robots remain before upgrading to a 2023.10+ target.**\n  This check only applies the first time you cross the 2023.10 line. If you're already running\n  2023.10 or later today (e.g. upgrading 2023.10 \u2192 2024.10, or 2023.x \u2192 2025.x), Classic folders\n  cannot exist on your system \u2014 they would have had to be migrated away already just to reach\n  your current version \u2014 so there is nothing to check here and this step doesn't apply.\n  For a customer still on a pre-2023.10 version (2021.10, 2022.4, 2022.10, or 2023.4) targeting\n  2023.10 or later for the first time: this is a hard blocker, not a recommendation \u2014\n  Orchestrator 2023.10+ setup stops with\n  `This Orchestrator version does not support Classic Folders and Classic Robots...` if any\n  classic objects are still in the database. Migrate them to Modern folders and delete the\n  classic folders **before** starting this upgrade \u2014 see `references/classic-to-modern-folders.md`.\n  This is listed as an explicit numbered step in UiPath's own pre-upgrade guidance, not just a\n  best practice. Do this check first, before anything else below, since it may add a whole\n  migration project ahead of the upgrade itself.\n  **If the customer is currently below 2022.10** (2021.10 or 2022.4), don't jump straight to the\n  final target \u2014 upgrade to **2022.10 first**, run the Classic-to-Modern migration wizard there\n  (the wizard only exists in the 2022.10\u20132023.4 window), delete the classic folders, *then*\n  continue the upgrade chain. Jumping straight to 2023.10+ leaves you blocked with no wizard\n  available on that version to fix it forward. See the \"Sequencing With an Orchestrator Upgrade\"\n  section of `references/classic-to-modern-folders.md` for the full reasoning, and confirm with\n  certainty whether classic folders remain via:\n  ```sql\n  SELECT * FROM [dbo].[OrganizationUnits] WHERE ProvisionType = 0 AND IsDeleted = 0;\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/before-you-upgrade\n- [ ] **Back up your Orchestrator database.**\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/backup-and-restore\n- [ ] **Run the pre-upgrade Identity Server cleanup script** (removes expired/consumed\n  `[identity].[PersistedGrants]` rows to speed up the primary key/index rebuild during\n  migration) \u2014 see the exact script in the SQL Maintenance section below.\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/before-you-upgrade\n\n### Additional practical checks\n\n- [ ] **Backup all config files:**\n  ```\n  C:\\Program Files (x86)\\UiPath\\Orchestrator\\UiPath.Orchestrator.dll.config\n  C:\\Program Files (x86)\\UiPath\\Orchestrator\\Identity\\appsettings.Production.json\n  C:\\Program Files (x86)\\UiPath\\Orchestrator\\Webhooks\\appsettings.Production.json\n  C:\\Program Files (x86)\\UiPath\\Orchestrator\\ResourceCatalog\\appsettings.Production.json\n  C:\\Program Files (x86)\\UiPath\\Orchestrator\\web.config\n  ```\n- [ ] **Back up all NuGet package directories**\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-backup-and-restore\n- [ ] **Note current version** (Help \u2192 About in Orchestrator portal)\n- [ ] **Note SSL certificate thumbprint** (certlm.msc \u2192 Personal \u2192 Certificates)\n- [ ] **Confirm SQL account** still has `db_owner` on the Orchestrator database\n- [ ] **Confirm the ASP.NET Core Hosting Bundle version required by the target release** \u2014\n  this has genuinely changed across releases, don't assume last engagement's version still applies:\n  | Orchestrator version | ASP.NET Core Hosting Bundle required |\n  |---|---|\n  | 2023.10 | 6.0.x **or** 8.0.x |\n  | 2024.10 | **8.0.x only** \u2014 confirmed on the live 2024.10 Software Requirements page (`ASP.NET Core Module: 8.0.x`); 6.0.x support was already dropped by this release, not just 2025.10 |\n  | 2025.10 | **8.0.x only** \u2014 6.0.x support has been dropped |\n  So the jump from 6.0.x to 8.0.x-only happens **at 2024.10**, not at 2025.10 \u2014 if the customer is\n  currently on 6.0.x and the target is 2024.10 or 2025.10, the Hosting Bundle upgrade to 8.0.x is a\n  **mandatory pre-upgrade step**, not optional. Only the ASP.NET Core *Module* (Hosting Bundle) needs\n  installing \u2014 no runtime \u2014 via `OPT_NO_RUNTIME=1` on the installer command line, unless Test Manager\n  is also being installed on the same box (in which case install the full runtime too, without that flag).\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-software-requirements\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2024.10/installation-guide/orchestrator-software-requirements\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2025.10/installation-guide/orchestrator-software-requirements\n- [ ] **Notify users** \u2014 schedule a maintenance window (Orchestrator will be down while the\n  installer runs and the database migrates; duration depends on DB size)\n- [ ] **Stop all active Robot jobs** (or wait for completion)\n- [ ] **Confirm license** covers the target version\n\n---\n\n## Legacy / Automation Project Compatibility\n\nIf the plan also involves upgrading Studio (see Robot/Studio compatibility above), check existing\nautomation projects before rolling out:\n\n- **Backward compatible:** a project built in an older Studio version runs fine on a newer Robot\n  (e.g. a project from Studio 2023.4 runs on a 2024.10 Robot).\n- **NOT forward compatible:** UiPath does not support forward compatibility \u2014 a project published\n  with a *newer* Studio/CLI may not run on an *older* Robot (e.g. a project from Studio 2024.10 may\n  not run on a 2023.4 Robot). Projects opened or created in a newer Studio version also cannot be\n  reliably opened with older Studio versions.\n- Practical implication: if this upgrade also bumps Studio, any project republished with the new\n  Studio needs to be validated against the current Robot fleet before rollout \u2014 don't assume it\n  \"just still works\" because the Orchestrator/Robot side upgraded cleanly.\n\n\ud83d\udcd6 https://docs.uipath.com/robot/standalone/latest/admin-guide/about-backward-and-forward-compatibility\n\n---\n\n## Step-by-Step Upgrade Checklist\n\n### Phase 1 \u2014 Pre-Upgrade\n\n- [ ] **1.1** Take SQL database backup (see above)\n- [ ] **1.2** Run the pre-upgrade Identity Server cleanup script (see SQL Maintenance section)\n- [ ] **1.3** Copy config file backups to a safe location off the server\n- [ ] **1.4** If upgrading .NET/ASP.NET Core Hosting Bundle version \u2014 install the correct new\n  Hosting Bundle first, run `IISRESET`\n- [ ] **1.5** Download the new version MSI from UiPath Customer Portal\n- [ ] **1.6** Stop IIS to prevent new connections during upgrade:\n  ```cmd\n  iisreset /stop\n  ```\n\n### Phase 2 \u2014 Run Upgrade MSI\n\n- [ ] **2.1** Right-click new MSI \u2192 Run as Administrator\n- [ ] **2.2** Installer detects existing installation \u2014 confirms upgrade mode\n- [ ] **2.3** Verify database connection string is pre-populated correctly\n- [ ] **2.4** Click **Test Connection** \u2014 must succeed\n- [ ] **2.5** Proceed with upgrade \u2014 installer runs DB migrations automatically\n- [ ] **2.6** Wait for completion (time varies with DB size \u2014 the PersistedGrants cleanup in\n  Phase 1 exists specifically to keep this step fast)\n- [ ] **2.7** Installer restarts IIS automatically at completion\n\n\ud83d\udcd6 Full step-by-step for both single-node and multi-node (primary/secondary) upgrades:\nhttps://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/updating-using-the-windows-installer\n\n### What \"rollback\" actually means for this MSI \u2014 read before the upgrade window, not after a failure\n\nA common assumption is: \"if the upgrade fails, just reinstall the old MSI and you're back to the\nprevious version.\" This is **only half true**, per internal engineering analysis of the MSI upgrade\ncode path:\n\n- The Orchestrator MSI can cleanly roll back the **application binaries** if the install itself\n  fails partway through.\n- It does **not** automatically roll back the **database**. The EF Core database migration step\n  (`UiMigrator.cs`) runs outside a suppressed/rollback-safe transaction scope, and the command\n  handler that applies it has no built-in rollback logic. Once the migration has committed,\n  reinstalling the previous MSI does not undo the schema changes.\n- Specific migrations (several introduced around the 24.10 line) are **destructively irreversible**\n  at the schema level \u2014 there is no \"undo\" once they've run, MSI reinstall or not.\n\n**Practical implication:** the only reliable rollback path is restoring the pre-upgrade SQL backup\ntaken in Phase 1 \u2014 not \"reinstall the old MSI and expect the database to follow.\" Confirm before\nthe maintenance window starts (not after a failure) that: the SQL backup is taken immediately\nbefore the upgrade begins, and someone on the call actually knows how to restore it.\n\ud83d\udcd6 Internal engineering reference: \"Upgrade Rollback - Orchestrator MSI: Official Claim vs Reality\"\n(UiPath internal Confluence)\n\n### Phase 3 \u2014 Post-Upgrade Validation\n\n- [ ] **3.1** Verify IIS Application Pools all show **Running**\n\n- [ ] **3.2** Re-check SSL thumbprint in Identity config (upgrade sometimes resets this):\n  ```json\n  // C:\\Program Files (x86)\\UiPath\\Orchestrator\\Identity\\appsettings.Production.json\n  \"Thumbprint\": \"<verify matches cert in certlm.msc>\"\n  ```\n\n- [ ] **3.3** Run Platform Configuration Tool to validate setup:\n  ```powershell\n  cd \"C:\\Program Files (x86)\\UiPath\\Orchestrator\\Tools\\PlatformConfiguration\"\n  .\\Platform.Configuration.Tool.ps1\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/platform-configuration-tool\n\n- [ ] **3.4** Access Orchestrator in browser \u2014 confirm version number updated\n\n- [ ] **3.5** Test login (Host admin + Tenant user)\n\n- [ ] **3.6** Run a test Robot job end-to-end\n\n- [ ] **3.7** Restart all Robots so they pick up the new settings (recommended post-upgrade step)\n\n- [ ] **3.8** Check Windows Event Viewer for new errors post-upgrade:\n  ```\n  Windows Logs \u2192 Application \u2192 Filter by time (since upgrade started)\n  ```\n\n- [ ] **3.9** If the customer upgraded or uninstalled a Solution (multi-process) package as part\n  of this change, spot-check that package versions are still present under folder-hierarchy feeds.\n  A confirmed (now-fixed) internal bug could delete the correct package version from a\n  folder-hierarchy feed as a side effect of a Solution upgrade/uninstall step \u2014 worth a quick check\n  on builds that predate the hotfix rather than assuming the feed is intact just because the\n  upgrade \"succeeded.\"\n  \ud83d\udcd6 Internal reference: \"External RCA: Orchestrator package version deleted after solution upgrade\"\n  (UiPath internal Confluence, Site Reliability space)\n\n---\n\n## Upgrade-Specific Common Errors\n\n| Error | Cause | Fix |\n|---|---|---|\n| `HTTP Error 500.37` after upgrade | .NET/ASP.NET Core Hosting Bundle version mismatch | Install the Hosting Bundle version required by the target release (check Software Requirements page); IISRESET |\n| `MetadataAddress must use HTTPS` | Thumbprint reset during upgrade | Update thumbprint in `Identity\\appsettings.Production.json` |\n| `Invalid issuer` login error | PublicUrl changed or identity config mismatch | Run Platform Config Tool with correct URL |\n| DB migration takes a very long time / times out | Large `[identity].[PersistedGrants]` table not cleaned up before upgrade | Run the pre-upgrade PersistedGrants cleanup script (see below) *before* starting the upgrade, not after |\n| Robots show `Disconnected` post-upgrade | Machine key changed or URL mismatch | Re-register robots with new machine key from Orchestrator |\n| `Object reference not set` on Webhooks | Webhooks config not updated | Restore Webhooks `appsettings.Production.json` from backup |\n\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-installation-troubleshooting\n\n---\n\n## Multi-Node, High Availability (HAA), and DR Upgrade Considerations\n\n**Important scoping note:** per UiPath's own Multi-Node Deployment page, multi-node Orchestrator\ndeployments are only officially supported if the High Availability Add-on (HAA) is used. If a\ncustomer genuinely has 2+ nodes concurrently serving live traffic without HAA, that is an\nunsupported configuration \u2014 flag it, don't just assume it's a normal setup.\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/multi-node-deployment\n\n### Topology 1 \u2014 Active/Passive *without* HAA (simple standby \u2014 not the same as UiPath's documented \"Active/Passive DR\" model below)\n\nWhat this usually means in practice: one Orchestrator node actively serves all traffic; a second\nnode is installed but sits idle/passive, brought online only on failover (e.g. via Windows\nFailover Clustering, or a manual DNS/NLB cut-over). Because only one node is ever live at a time,\nthere's no concurrent shared-cache/SignalR correctness problem, so HAA (Redis) isn't required \u2014\nthis is a different, simpler pattern than UiPath's own \"Disaster Recovery - Active/Passive\"\narchitecture covered under Topology 2, which **does** require HAA.\n\nUpgrade approach:\n- [ ] Take the passive node out of any failover/cluster rotation first, so it can't accidentally\n  receive traffic mid-upgrade.\n- [ ] Upgrade the active (primary) node exactly like a single-node upgrade (see the Step-by-Step\n  Upgrade Checklist above) \u2014 this is what runs the DB migration.\n- [ ] Once the active node is confirmed healthy on the new version, upgrade the passive node's\n  Orchestrator installation to match \u2014 it must never be left on an older version than the\n  now-migrated DB schema.\n- [ ] Only re-enable the passive node in the failover/cluster configuration once **both** nodes\n  are confirmed on the identical version.\n- Do not let any old-version node point at the already-migrated (new-version) database at any\n  point, even briefly \u2014 mixed versions sharing one DB is not supported.\n\n### Topology 2 \u2014 Officially documented multi-node upgrade (HA, Active/Passive DR, and Active/Active DR \u2014 all require HAA)\n\nThis is UiPath's own documented process. It applies equally to: a standard multi-node HA\ndeployment, the **Active/Passive DR** model (HA in the primary datacenter plus a reduced DR\ndatacenter, with HAA installed in CRDB mode), and the **Active/Active \"Two Active Data Centers\"**\nmodel (both datacenters live simultaneously, NLB round-robins traffic between them, requires 2\nHAA licenses plus a SQL Server Always On Availability Group spanning both datacenters).\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/disaster-recovery-activepassive\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/disaster-recovery-two-active-data-centers\n\nUiPath does not document a rolling/zero-downtime upgrade path for any of these \u2014 plan for a full\nmaintenance window across every node, not a staggered rollout:\n\n- [ ] **1.** Back up automation packages, `web.config`, `UiPath.Orchestrator.dll.config`, and the\n  database \u2014 same as any upgrade.\n- [ ] **2. Primary node first, and only once.** Run the installer on the primary node:\n  ```cmd\n  :: Attended\n  UiPathOrchestrator.msi OUTPUT_PARAMETERS_FILE=c:\\temp\\upgradeParams.json /lvx* upgrade.log\n\n  :: Unattended\n  UiPathOrchestrator.msi PUBLIC_URL=https://hostname.local APPPOOL_USER_NAME=serviceAccount APPPOOL_PASSWORD=pass OUTPUT_PARAMETERS_FILE=c:\\temp\\upgradeParams.json /lvx* upgrade.log /Q\n  ```\n  This is what actually runs the DB migration \u2014 it must happen exactly once, on the primary node\n  only. **Save the generated `upgradeParams.json`** \u2014 every secondary node's install depends on it.\n- [ ] **3. Then every secondary node**, using the params file produced by the primary:\n  ```cmd\n  UiPathOrchestrator.msi SECONDARY_NODE=1 PARAMETERS_FILE=c:\\temp\\upgradeParams.json /lvx* upgrade.log /Q\n  ```\n  Repeat for each secondary/HA node. None of them re-run the DB migration \u2014 they join the schema\n  the primary node already migrated.\n- [ ] **4. Flush HAA cache keys** once every node is on the new version:\n  - Single-region HAA (standard HA, or the Active/Passive DR model within one HAA cluster):\n    ```\n    redis-cli -h <hostname> -p <portnumber> -a <password> flushall\n    ```\n    (HAA uses port `10000` by default.)\n  - Active-Active CRDB (the geo-replicated Two-Active-Data-Centers model):\n    ```\n    crdb-cli crdb flush --crdb-guid <guid> [--no-wait]\n    ```\n  Skipping this step is a common cause of stale cache/permission issues right after a multi-node\n  upgrade.\n- [ ] **5.** Restart all Robots afterward so they reconnect against the fully upgraded cluster.\n\n**Note:** although the installer prompts for host/default-tenant admin passwords during a\nsecondary-node install, they're not actually applied \u2014 keep using your existing passwords to log\nin afterward.\n\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/updating-using-the-windows-installer\n\n**Real-world implication for a \"2023.x \u2192 2025.x\" scenario:** none of the sequencing above changes\nbased on target version \u2014 primary-then-secondary ordering and the flush step are identical\nregardless of which versions you're moving between, as long as it's a supported LTS-chain hop\n(see Upgrade Path Rules above). What *does* change per-version is everything else already covered\nin this guide \u2014 the .NET/Hosting Bundle requirement, Classic folder scoping, and DB maintenance.\n\n---\n\n## SQL Maintenance \u2014 Recommended Before Upgrade\n\n**This is an official, documented pre-upgrade step** \u2014 not an optional nice-to-have. UiPath's\nown \"Before you upgrade\" guidance is exactly: (1) back up the database, (2) run this cleanup\nscript, (3) migrate Classic folders to Modern folders if any remain.\n\n### Step 1 \u2014 Clean up Identity Server's PersistedGrants table\n\nThis removes expired/consumed grants, which speeds up the `[identity].[PersistedGrants]`\nprimary key and index rebuild during the upgrade's database migration. This is the exact\nscript UiPath publishes for this purpose:\n\n```sql\nDECLARE @Now DATETIME2 = GETUTCDATE()\nDECLARE @ConsumedGrantsGracePeriod DATETIME2 = DATEADD(hour, -2, @Now)\n\nDECLARE @ConsumedDeleted int = 1\nDECLARE @ExpiredDeleted int = 1\nDECLARE @BatchSize int = 500\nDECLARE @ConsumedBatchesDeleted int = 0\nDECLARE @ExpiredBatchesDeleted int = 0\n\nSET LOCK_TIMEOUT 0\nSET DEADLOCK_PRIORITY LOW\n\nWHILE (@ConsumedDeleted=1 OR @ExpiredDeleted=1)\nBEGIN\n  IF @ConsumedDeleted=1\n  BEGIN\n    BEGIN TRY\n      DELETE TOP(@BatchSize) FROM [identity].[PersistedGrants] WHERE [ConsumedTime] IS NOT NULL AND [ConsumedTime] < @ConsumedGrantsGracePeriod AND [Type] <> 'reference_token'\n      IF @@ROWCOUNT = 0 SET @ConsumedDeleted=0\n      ELSE SET @ConsumedBatchesDeleted = @ConsumedBatchesDeleted + 1\n    END TRY\n    BEGIN CATCH\n      PRINT 'Failed to delete consumed grants'\n    END CATCH\n  END\n  IF @ExpiredDeleted=1\n  BEGIN\n    BEGIN TRY\n      DELETE TOP(@BatchSize) FROM [identity].[PersistedGrants] WHERE [Expiration] < @Now AND [Type] <> 'reference_token'\n      IF @@ROWCOUNT = 0 SET @ExpiredDeleted=0\n      ELSE SET @ExpiredBatchesDeleted = @ExpiredBatchesDeleted + 1\n    END TRY\n    BEGIN CATCH\n      PRINT 'Failed to delete expired grants'\n    END CATCH\n  END\n  IF (@ExpiredDeleted=1 OR @ConsumedDeleted=1)\n    WAITFOR DELAY '00:00:05.000'\nEND\n```\n\n\ud83d\udcd6 Source (exact script, verify against your target version): https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/before-you-upgrade\n\n### Step 2 \u2014 General database cleanup (Logs, Jobs, QueueItems, etc.)\n\nFor large `dbo.Logs` / `dbo.Jobs` / `dbo.QueueItems` tables, do **not** write ad-hoc DELETE\nloops \u2014 UiPath publishes a maintained cleanup framework for exactly this, downloadable from\nthe Customer Portal:\n\n- `CreateOrchestratorCleanupObjects.sql` creates `dbo.__CleanupLog`, `dbo.GetOrCreateArchiveTable`,\n  and `dbo.RunOrchestratorCleanup` \u2014 then you run `dbo.RunOrchestratorCleanup` with an XML\n  config describing what to clean up and how long to keep.\n- A PowerShell equivalent (`RunOrchestratorCleanup.ps1`) exists for environments where you\n  can't run SQL scripts directly.\n- **You do not need to upgrade or replace these scripts each time Orchestrator is upgraded** \u2014\n  per UiPath's own note, they continue to function as expected across Orchestrator versions.\n  This is a recurring maintenance job (schedule it, e.g. via SQL Server Agent), not a one-time\n  pre-upgrade task \u2014 but running it before an upgrade specifically shrinks the tables the\n  upgrade's own DB migration has to touch, which is why it's called out here.\n- For very high-volume Robot logging, UiPath's own recommendation is to write Robot logs\n  directly to **Elasticsearch** instead of the SQL `Logs` table once volumes get large \u2014 see\n  the \"Write Robot Logs to Elasticsearch\" section of the Performance Best Practices page. There\n  is no single official row-count threshold published for when to do this \u2014 treat it as a\n  capacity-planning decision for your environment, not a fixed number.\n\n**Which tables the recommended cleanup config actually covers, and why each one matters**\n(this is UiPath's own preconfigured `CleanupConfig` XML, not a partial list \u2014 every table below\nis named explicitly in the official sample):\n\n| Table | Default retention | What it stores / why it needs cleanup |\n|---|---|---|\n| `QueueItems` | 180 days (only terminal states \u2014 Successful/Failed/Abandoned/etc.) | One row per transaction item ever added to a queue. Usually the single biggest driver of DB growth in any environment with unattended queue processing. |\n| `Jobs` | 180 days (only terminal states \u2014 Stopped/Faulted/Successful) | One row per Robot job execution. Grows fast with large unattended fleets or high job-trigger frequency. |\n| `Logs` | 90 days | One row per log message emitted by every running process (Info/Warn/Error/Trace). Typically the **fastest-growing table by far** \u2014 this is the table behind UiPath's advice to offload Robot logs to Elasticsearch at scale. |\n| `AuditLogs` | 365 days | Records administrative and user actions inside Orchestrator (who changed what, when) \u2014 kept longer by default because it's the compliance/security audit trail. |\n| `Tasks` | 180 days (only soft-deleted rows, `IsDeleted = 1`) | Action Center human-in-the-loop task records. |\n| `QueueProcessingRecords` | 30 days | Queue throughput/reporting statistics, not the queue items themselves. |\n| `Sessions` | 180 days | Robot/Unattended session heartbeat records. |\n| `RobotLicenseLogs` | 180 days | License usage history per Robot \u2014 useful for license audits, not needed indefinitely. |\n| `UserNotifications` / `TenantNotifications` | 90 days | In-app notification bell items \u2014 purely UI convenience data. |\n| `Ledger` / `LedgerDeliveries` | 7 days | Short-lived internal event/webhook delivery bookkeeping \u2014 cleared quickly by design. |\n| `Assets` | 120 days (only soft-deleted rows, `IsDeleted = 1`) | Deleted asset records kept briefly for recovery, then purged. |\n| `__CleanupLog` | 7 days | The cleanup script's own execution log \u2014 self-pruning. |\n\nEach row can be independently tuned (or disabled) in the XML config \u2014 the table above reflects\nUiPath's **recommended defaults**, not hard limits.\n\n\ud83d\udcd6 Full script downloads + XML config reference: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/maintenance-considerations\n\ud83d\udcd6 Elasticsearch offload guidance for high-volume Robot logs: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/performance-best-practices\n\n**Note:** there is no `[identity].[Logs]` table \u2014 Identity Server's own maintenance page\ncovers a separate table, `[identity].UserLoginAttempts`, with its own archive-then-delete\napproach:\n- Recommended: create a separate archive database first (e.g. `UiPathIdentityArchives`) with\n  an `ArchiveUserLoginAttempts` table matching the source schema, so old rows are preserved\n  for audit purposes before being deleted from the live table.\n- UiPath's own example script deletes/archives `UserLoginAttempts` rows older than **60 days**\n  (configurable via the `@NumberOfDaysToKeep` variable in the script) \u2014 this table logs every\n  login attempt (success and failure), so it grows continuously with user/robot sign-in volume.\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/is-maintenance-considerations\n\n---\n\n## Reference Links\n\n- Before you upgrade (official pre-upgrade steps): https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/before-you-upgrade\n- Updating using the Windows Installer: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/updating-using-the-windows-installer\n- Backup and Restore overview: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/backup-and-restore\n- Orchestrator database maintenance (log/data cleanup scripts): https://docs.uipath.com/orchestrator/standalone/2022.10/installation-guide/maintenance-considerations\n- Identity Server maintenance: https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/is-maintenance-considerations\n- Software Requirements (Hosting Bundle version per release): https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/orchestrator-software-requirements\n- Software Requirements \u2014 2024.10 (confirms 8.0.x-only, no 6.0.x): https://docs.uipath.com/orchestrator/standalone/2024.10/installation-guide/orchestrator-software-requirements\n- Software Requirements \u2014 2025.10: https://docs.uipath.com/orchestrator/standalone/2025.10/installation-guide/orchestrator-software-requirements\n- Classic folders removal impact on upgrades: https://docs.uipath.com/overview/other/latest/overview/classic-folders-removal\n- About Updating and Migrating (in-place mechanics, DB pointing behavior): https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/about-updating-and-migrating\n- Changing the Orchestrator / Identity Server URL (side-by-side cutover SQL): https://docs.uipath.com/orchestrator/standalone/2023.10/installation-guide/changing-the-orchestrator-identity-server-url\n",
  as: "# Automation Suite \u2014 Install & Upgrade Guide (Kubernetes / OpenShift)\n\n## Scope\n\nInstallation and upgrade of UiPath Automation Suite on an **existing/self-managed Kubernetes cluster**\n(AKS, EKS) or Red Hat OpenShift \u2014 the \"bring your own Kubernetes\" deployment model, installed via the\n`uipathctl` CLI and an `input.json` configuration file.\n\n> **Important distinction \u2014 don't confuse this with \"Automation Suite on Linux\".**\n> UiPath also ships a separate, self-managed-RKE2 install path (\"Automation Suite on Linux\",\n> bare metal/VM) that provisions its own Kubernetes cluster and uses a *different* config file\n> (`cluster_config.json`) and installer script (`install-uipath.sh`). That is a different guide\n> and a different toolchain from the one below \u2014 if you're standing up RKE2 yourself rather than\n> pointing the installer at an existing AKS/EKS/OpenShift cluster, use that guide instead.\n> \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide/automation-suite-overview\n>\n> **On GKE:** UiPath does not publish a dedicated \"existing GKE cluster\" install guide analogous to\n> the EKS/AKS guide. GCP is supported through the self-managed \"Automation Suite on Linux\" installer\n> running on GCP VMs (see the GCP deployment architecture doc), not as a bring-your-own-Kubernetes\n> target. Treat \"GKE\" as unverified/unsupported for the workflow described in this file unless your\n> UiPath account team confirms otherwise for your version. Note: UiPath's own 2023.10 version of this\n> page now redirects PSEs to the 2024.10 documentation for the GCP template \u2014 use the 2024.10 link below.\n> \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide/gcp-deployment-architecture\n\n---\n\n## Deployment Profiles\n\nThe `input.json` file has a single `\"profile\"` field. The only value confirmed in current UiPath\nsample configurations is:\n\n| Profile value | Use Case |\n|---|---|\n| `ha` | Production, high-availability multi-node deployment (the standard profile shown in UiPath's own AKS/EKS `input.json` examples) |\n\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/aks-inputjson-example\n\n> **Correction:** earlier drafts of this doc listed `single_node_serverless`, `multi_node_serverless`,\n> `ha_prod`, and `custom` as selectable profile values. Those names could not be verified against\n> current UiPath documentation for the AKS/EKS/OpenShift install path and appear to conflate this\n> guide with the separate single-node-evaluation / multi-node-HA-ready-production terminology used\n> for \"Automation Suite on Linux\". If you need a non-production/evaluation footprint on an existing\n> Kubernetes cluster, confirm the exact supported configuration with current docs or your UiPath\n> account team rather than relying on the profile names above.\n\n> **Never use a non-HA/single-node footprint in production.** Data loss risk on node failure applies\n> regardless of deployment model.\n\n---\n\n## Pre-Install Checklist (Kubernetes)\n\n### Infrastructure Requirements\n\n- [ ] Kubernetes version: Automation Suite supports a **rolling window of upstream N-1 to N-3**\n  Kubernetes versions per Automation Suite Cumulative Update (CU) \u2014 there is no single fixed range.\n  For example, AS 2023.10.12 supports K8s 1.31\u20131.33, while AS 2023.10.3 supported 1.27\u20131.29.\n  Always check the compatibility matrix for your specific AS version/CU before provisioning nodes.\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/compatibility-matrix\n- [ ] Node OS: varies by provider/version \u2014 e.g. Ubuntu 22.04 is the documented baseline for AKS;\n  EKS documents specific RHEL/Amazon Linux/Bottlerocket combinations per EKS version (e.g. RHEL 8.8\n  is called out specifically for EKS 1.33). Confirm against the compatibility matrix for your target\n  version rather than assuming a fixed OS/version pair.\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2023.10/installation-guide-eks-aks/compatibility-matrix\n- [ ] Node hardware \u2014 documented **minimum** to run the mandatory platform services (Identity,\n  licensing, routing) plus Orchestrator is **8 vCPU / 16 GB RAM per node**. Larger, fewer nodes are\n  more efficient than many small nodes (fixed per-node overhead). Use UiPath's Automation Suite\n  Sizing/Capacity Calculator for your actual product mix and load rather than a flat number.\n  Task Mining, if enabled, requires an additional dedicated node with 20 vCPU / 60 GB RAM.\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/kubernetes-cluster-and-nodes\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/capacity-planning\n\n  > **Correction:** earlier drafts stated \"16 vCPU / 32 GB RAM (production)\" for server nodes \u2014 this\n  > is roughly double the documented minimum. Don't over-provision blindly off this doc; size with\n  > the calculator.\n- [ ] Storage: Block storage CSI driver installed, with a default StorageClass set\n- [ ] LoadBalancer or Ingress controller available (NGINX is the ingress controller UiPath documents\n  configuring)\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/configuring-nginx-ingress-controller\n- [ ] DNS entry pointing to cluster LoadBalancer IP/FQDN\n- [ ] SSL certificate for cluster FQDN\n- [ ] Outbound internet access (or air-gap with an OCI-compliant private registry configured)\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/configuring-the-oci-compliant-registry\n\n### Tools Required on Install Machine\n\n```bash\n# Verify these are available\nkubectl version --client\njq --version\nopenssl version\n\n# Download the UiPath CLI used for install/upgrade (uipathctl) and versions.json\n# for your target Automation Suite version \u2014 see \"Downloading the installation packages\"\n```\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/downloading-the-installation-packages\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/running-uipathctl\n\n### Pre-Install Network Checks\n\n```bash\n# Verify DNS resolves to cluster\nnslookup <your-AS-fqdn>\n\n# Test kubectl connectivity\nkubectl get nodes\nkubectl get namespaces\n```\n\n---\n\n## Step-by-Step Install Checklist\n\n### Phase 1 \u2014 Prepare input.json\n\n- [ ] **1.1** Download the installation packages (`uipathctl`, `versions.json`) for your target\n  Automation Suite version\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/downloading-the-installation-packages\n- [ ] **1.2** Configure `input.json` \u2014 either by hand or using the Automation Suite Installer Wizard\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/configuring-inputjson\n- [ ] **1.3** A trimmed example based on UiPath's published AKS reference (fields you'll actually\n  need to touch for a typical HA install \u2014 see the source link for the full field list including\n  per-product `external_object_storage` blocks, proxy, snapshot/backup, etc.):\n\n```json\n{\n  \"kubernetes_distribution\": \"aks\",\n  \"install_type\": \"online\",\n  \"profile\": \"ha\",\n  \"registries\": {\n    \"docker\": {\n      \"url\": \"registry.uipath.com\",\n      \"username\": \"<your-uipath-portal-email>\",\n      \"password\": \"<your-uipath-portal-password>\"\n    },\n    \"helm\": {\n      \"url\": \"registry.uipath.com\",\n      \"username\": \"<your-uipath-portal-email>\",\n      \"password\": \"<your-uipath-portal-password>\"\n    }\n  },\n  \"fqdn\": \"automationsuite.company.com\",\n  \"admin_username\": \"admin\",\n  \"admin_password\": \"<strong-password>\",\n  \"sql\": {\n    \"create_db\": false,\n    \"server_url\": \"<sql-host>\",\n    \"port\": \"1433\",\n    \"username\": \"<sql-user>\",\n    \"password\": \"<sql-pass>\"\n  },\n  \"orchestrator\": { \"enabled\": true },\n  \"storage_class\": \"<your-default-storageclass>\"\n}\n```\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/aks-inputjson-example (full sample, AKS)\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/eks-inputjson-example (full sample, EKS)\n\n  > **Correction:** earlier drafts of this doc used `cluster_config.json` with fields like\n  > `multiNode`, `rke_token`, `fixed_rke_address`, and a nested `infra.docker_registry` block, plus\n  > a top-level `smtp` block. Those fields belong to the separate \"Automation Suite on Linux\" (RKE2)\n  > config schema, not the `input.json` used for AKS/EKS/OpenShift installs, and could not be\n  > verified for this deployment path \u2014 they've been removed rather than guessed at. If you need\n  > SMTP configuration for this install type, check the current `input.json` reference for your\n  > version.\n\n- [ ] **1.4** Validate JSON syntax: `jq . input.json`\n\n### Phase 2 \u2014 Run the Installer (uipathctl)\n\n```bash\n# Check infrastructure prerequisites\n./uipathctl prereq run input.json --versions versions.json\n\n# Dry run first (simulates the apply, does not deploy)\n./uipathctl manifest apply --dry-run input.json --versions versions.json\n\n# Full install\n./uipathctl manifest apply input.json --versions versions.json\n```\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/reference-guide/uipathctl-manifest-apply\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/insta
