document.getElementById('main').addEventListener('change', (e) => {
  if (e.target.matches('input[type=checkbox]')) {
    const label = e.target.closest('label');
    label.classList.toggle('done', e.target.checked);
    const details = e.target.closest('details.section');
    if (details) {
      const badge = details.querySelector('summary .badge');
      if (badge) {
        const total = parseInt(badge.dataset.total, 10);
        const checked = details.querySelectorAll('input[type=checkbox]:checked').length;
        badge.textContent = checked + '/' + total;
      }
    }
  }
});

function versionSelectHtml(id, options) {
  options = options || {};
  let versions = ALL_VERSIONS;
  if (options.maxVersion) {
    const idx = ALL_VERSIONS.indexOf(options.maxVersion);
    versions = idx === -1 ? ALL_VERSIONS : ALL_VERSIONS.slice(0, idx);
  }
  if (options.minVersion) {
    const idx = ALL_VERSIONS.indexOf(options.minVersion);
    // Strictly AFTER minVersion — an upgrade target must be newer than the current version, not equal to it.
    versions = idx === -1 ? versions : versions.slice(idx + 1);
  }
  let olderOpt = options.includeOlder ? '<option value="pre-2021.10">2021.10 or older</option>' : '';
  let opts = versions.map(v => '<option value="' + v + '">' + v + ' (' + VERSION_INFO[v].status + ')</option>').join('');
  return '<select id="' + id + '"><option value="">Select a version&hellip;</option>' + olderOpt + opts +
    '<option value="__other__">Other / not listed&hellip;</option></select>' +
    '<input type="text" id="' + id + '_other" placeholder="Type the version&hellip;" style="display:none; margin-top:8px;">';
}

function matchOptionFuzzy(options, text) {
  const q = text.toLowerCase();
  const tokens = q.split(/[^a-z0-9]+/).filter(t => t.length > 2);
  let best = null, bestScore = 0;
  options.forEach(opt => {
    const l = opt.label.toLowerCase();
    let score = 0;
    if (q.indexOf(l) !== -1 || l.indexOf(q) !== -1) score += 5;
    tokens.forEach(t => { if (l.indexOf(t) !== -1) score += 1; });
    if (score > bestScore) { bestScore = score; best = opt; }
  });
  return bestScore > 0 ? best : null;
}

function versionOrderIssue(current, target) {
  if (!current || !target) return null; // current not yet answered (e.g. first render) — nothing to validate against
  if (current === target) {
    return 'Target version is the same as the current version (' + current + ') — that’s not an upgrade. Pick a version newer than ' + current + ', or use Troubleshooting if this isn’t actually an upgrade scenario.';
  }
  const ci = ALL_VERSIONS.indexOf(current), ti = ALL_VERSIONS.indexOf(target);
  if (ci !== -1 && ti !== -1 && ti < ci) {
    return 'Target version (' + target + ') is older than the current version (' + current + ') — that’s a downgrade, which isn’t a supported upgrade path. Double-check which version is current and which is the target, then try again.';
  }
  return null;
}

function ltsSkipWarning(current, target) {
  const ci = LTS_ORDER.indexOf(current), ti = LTS_ORDER.indexOf(target);
  if (ci === -1 || ti === -1 || ti <= ci) return null;
  if (ti - ci > 1) {
    const skipped = LTS_ORDER.slice(ci + 1, ti);
    return 'This jump skips intermediate version(s): <strong>' + skipped.join(', ') + '</strong>. UiPath requires sequential upgrades &mdash; plan intermediate hops through ' + skipped.join(' &rarr; ') + ' before reaching ' + target + '.';
  }
  return null;
}

function classicFolderUpgradeWarning(currentVersion, targetVersion) {
  const cutoff = ALL_VERSIONS.indexOf('2023.10');
  const targetIdx = ALL_VERSIONS.indexOf(targetVersion);
  if (targetIdx === -1 || targetIdx < cutoff) return null; // target itself predates the removal, not relevant

  const currentIdx = ALL_VERSIONS.indexOf(currentVersion);
  if (currentIdx !== -1 && currentIdx >= cutoff) {
    // Current version is already 2023.10+, which means Classic folders cannot exist here —
    // they would have had to be migrated already just to reach this version. Nothing to warn about.
    return null;
  }

  if (currentVersion === 'pre-2021.10') {
    return 'Current version is <strong>2021.10 or older</strong> and target is <strong>' + targetVersion + '</strong> &mdash; Orchestrator 2023.10+ blocks setup outright if any Classic folders/robots remain in the database. Confirm they have been migrated to Modern folders (and the classic folders deleted) <strong>before</strong> running this upgrade. If not done yet, run the Classic&rarr;Modern migration path first.';
  }

  if (currentIdx === -1) {
    // Current version wasn't recognized/selected (e.g. "Other") — we can't rule this out, so warn
    // but phrase it as a check rather than an assertion.
    return 'Target is <strong>' + targetVersion + '</strong> &mdash; if your <em>current</em> version predates 2023.10, note that Orchestrator 2023.10+ blocks setup outright if any Classic folders/robots remain in the database. Confirm none remain (migrated to Modern folders, classic folders deleted) before upgrading. If your current version is already 2023.10 or later, this does not apply — Classic folders cannot exist there.';
  }

  return 'Current version is <strong>' + currentVersion + '</strong> (predates 2023.10) and target is <strong>' + targetVersion + '</strong> &mdash; Orchestrator 2023.10+ blocks setup outright if any Classic folders/robots remain in the database. Confirm they have been migrated to Modern folders (and the classic folders deleted) <strong>before</strong> running this upgrade. If not done yet, run the Classic&rarr;Modern migration path first.';
}

}

function scopeChips(bits) {
  return '<div class="chips">' + bits.filter(Boolean).map(b => '<span class="chip">' + escapeHtml(b) + '</span>').join('') + '</div>';
}

// The reference markdown cites docs.uipath.com links pinned to a specific version (e.g. 2023.10)
// as a stable baseline. But a checklist for a real upgrade (e.g. 2024.10 -> 2025.10) should point
// at docs for the version actually being installed, not a hardcoded older one. Rewrite any
// "docs.uipath.com/orchestrator/standalone/<version>/..." link in the rendered HTML to use the
// selected target version instead, so links always match what the customer is actually upgrading to.
function versionizeDocLinks(html, version) {
  if (!version) return html;
  return html
    .replace(/(docs\.uipath\.com\/orchestrator\/standalone\/)\d{4}\.\d+(\/)/g, '$1' + version + '$2')
    .replace(/(docs\.uipath\.com\/automation-suite\/automation-suite\/)\d{4}\.\d+(\/)/g, '$1' + version + '$2');
}

function actionBar() {
  return '<div class="action-bar">' +
    '<button class="action-btn primary" id="copyBtn">📋 Copy checklist</button>' +
    '<button class="action-btn" id="newCaseBtn">⟲ Start over</button>' +
    '</div>';
}
function wireActionBar(resultEl) {
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(resultEl.innerText).then(() => {
      const b = document.getElementById('copyBtn');
      const old = b.textContent; b.textContent = '✅ Copied'; setTimeout(() => b.textContent = old, 1500);
    });
  });
  document.getElementById('newCaseBtn').addEventListener('click', restart);
}

function showNode(nodeId) {
  steps.push({ nodeId });
  const node = TREE[nodeId];

  if (node.terminal) {
    mainInner.innerHTML = node.render(answers);
    const resultEl = mainInner.querySelector('.result-card');
    wireActionBar(resultEl);
    const resultHeader = resultEl && resultEl.querySelector('.result-header');
    if (resultHeader && steps.length > 1) {
      resultHeader.insertAdjacentHTML('beforeend', '<button class="back-link result-back" id="backBtn">&larr; back</button>');
      const rb = document.getElementById('backBtn');
      if (rb) rb.addEventListener('click', goBack);
    }
    renderSidebar();
    return;
  }

  let controls = '';
  if (node.type === 'choice') {
    const single = node.options.length <= 2 || node.wide;
    controls = '<div class="opt-grid' + (single ? ' single' : '') + '">' + node.options.map((opt, i) =>
      '<div class="opt-card" data-i="' + i + '"><span class="ic-badge">' + iconForLabel(opt.label) + '</span><span class="opt-label">' + escapeHtml(opt.label) + '</span><span class="arrow">&rarr;</span></div>'
    ).join('') + '</div>' +
    '<div class="other-row-label">Or just describe it in your own words:</div>' +
    '<div class="other-row"><input type="text" id="otherTxt_' + nodeId + '" placeholder="e.g. customer\'s Orchestrator won\'t start after the upgrade&hellip;"><button class="other-send" id="otherGo_' + nodeId + '" title="Send">➤</button></div>';
  } else if (node.type === 'select') {
    let selOpts = {};
    if (nodeId === 'classicmodern_version') selOpts = { maxVersion: '2023.4' };
    if (node.answerKey === 'currentVersion') selOpts.includeOlder = true;
    controls = '<div class="field-row">' + versionSelectHtml('sel_' + nodeId, selOpts) + '<button class="go-btn" id="go_' + nodeId + '">Continue →</button></div><div class="field-error" id="err_' + nodeId + '" style="display:none;"></div>';
  } else if (node.type === 'text') {
    controls = '<div class="field-row"><textarea id="txt_' + nodeId + '" placeholder="' + (node.placeholder || '') + '"></textarea><button class="go-btn" id="go_' + nodeId + '">Search →</button></div>';
  } else if (node.type === 'version-pair') {
    controls = '<div class="field-row"><div class="other-row-label">Current version</div>' + versionSelectHtml('sel_' + nodeId + '_current', { includeOlder: true }) + '</div>' +
      '<div class="field-row"><div class="other-row-label">Target version</div>' + versionSelectHtml('sel_' + nodeId + '_target', {}) + '</div>' +
      '<button class="go-btn" id="go_' + nodeId + '">Continue →</button>' +
      '<div class="field-error" id="err_' + nodeId + '" style="display:none;"></div>';
  } else if (node.type === 'upgrade-combo') {
    controls = '<div class="field-row"><div class="other-row-label">Deployment type</div>' +
      '<div class="opt-grid" id="depGrid_' + nodeId + '">' +
        '<div class="opt-card" data-dep="Standalone"><span class="ic-badge">' + iconForLabel('Standalone') + '</span><span class="opt-label">Standalone</span></div>' +
        '<div class="opt-card" data-dep="Automation Suite"><span class="ic-badge">' + iconForLabel('Automation Suite') + '</span><span class="opt-label">Automation Suite</span></div>' +
      '</div></div>' +
      '<div class="field-row"><div class="other-row-label">Current version</div>' + versionSelectHtml('sel_' + nodeId + '_current', { includeOlder: true }) + '</div>' +
      '<div class="field-row"><div class="other-row-label">Target version</div>' + versionSelectHtml('sel_' + nodeId + '_target', {}) + '</div>' +
      '<div class="field-row" id="modeRow_' + nodeId + '" style="display:none;"><div class="other-row-label">Upgrade mode (Standalone only)</div>' +
        '<div class="opt-grid" id="modeGrid_' + nodeId + '">' +
          '<div class="opt-card" data-mode="In-place"><span class="ic-badge">' + iconForLabel('In-place') + '</span><span class="opt-label">In-place</span></div>' +
          '<div class="opt-card" data-mode="Side-by-side"><span class="ic-badge">' + iconForLabel('Side-by-side') + '</span><span class="opt-label">Side-by-side</span></div>' +
        '</div></div>' +
      '<button class="go-btn" id="go_' + nodeId + '">Continue →</button>' +
      '<div class="field-error" id="err_' + nodeId + '" style="display:none;"></div>';
  }

  mainInner.innerHTML = '<div class="question-card"><div class="kicker"><span class="kicker-left"><span class="step-num">' + steps.length + '</span><span class="step-text">Step ' + steps.length + '</span></span>' + backLinkHtml() + '</div><h2>' + node.question + '</h2>' + controls + '</div>';

  if (node.type === 'choice') {
    node.options.forEach((opt, i) => {
      mainInner.querySelector('[data-i="' + i + '"]').addEventListener('click', () => {
        answers[node.answerKey] = opt.value !== undefined ? opt.value : opt.label;
        progressLog.push({ q: node.shortQ || node.question, a: opt.label });
        renderSidebar();
        advance(node, opt.next);
      });
    });
    const submitOther = () => {
      const txt = document.getElementById('otherTxt_' + nodeId);
      const val = txt.value.trim();
      if (!val) return;
      const match = matchOptionFuzzy(node.options, val);
      answers[node.answerKey] = val;
      progressLog.push({ q: node.shortQ || node.question, a: val });
      renderSidebar();
      if (match) { advance(node, match.next); }
      else {
        const fb = typeof node.fallbackNext === 'function' ? node.fallbackNext(answers) : (node.fallbackNext || node.options[0].next);
        advance(node, fb);
      }
    };
    document.getElementById('otherGo_' + nodeId).addEventListener('click', submitOther);
    document.getElementById('otherTxt_' + nodeId).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); submitOther(); }
    });
  } else if (node.type === 'select') {
    const selEl = document.getElementById('sel_' + nodeId);
    const otherInput = document.getElementById('sel_' + nodeId + '_other');
    selEl.addEventListener('change', () => {
      otherInput.style.display = selEl.value === '__other__' ? 'block' : 'none';
      if (selEl.value === '__other__') otherInput.focus();
    });
    document.getElementById('go_' + nodeId).addEventListener('click', () => {
      let val = selEl.value;
      if (!val) return;
      if (val === '__other__') { val = otherInput.value.trim(); if (!val) return; }
      const errEl = document.getElementById('err_' + nodeId);
      if (typeof node.validate === 'function') {
        const errMsg = node.validate(val, answers);
        if (errMsg) {
          if (errEl) { errEl.textContent = '⚠️ ' + errMsg; errEl.style.display = 'block'; }
          return; // do not advance, do not log — let the customer correct the selection
        }
      }
      if (errEl) errEl.style.display = 'none';
      answers[node.answerKey] = val;
      progressLog.push({ q: node.shortQ || node.question, a: val });
      renderSidebar();
      advance(node, node.next);
    });
  } else if (node.type === 'version-pair') {
    const curSel = document.getElementById('sel_' + nodeId + '_current');
    const curOther = document.getElementById('sel_' + nodeId + '_current_other');
    const tgtSel = document.getElementById('sel_' + nodeId + '_target');
    const tgtOther = document.getElementById('sel_' + nodeId + '_target_other');

    function filterTargetOptions() {
      const curVal = curSel.value === '__other__' ? '' : curSel.value;
      const curIdx = ALL_VERSIONS.indexOf(curVal);
      Array.from(tgtSel.options).forEach(o => {
        if (o.value === '' || o.value === '__other__') { o.disabled = false; o.hidden = false; return; }
        const idx = ALL_VERSIONS.indexOf(o.value);
        const stale = curIdx !== -1 && idx !== -1 && idx <= curIdx;
        o.disabled = stale; o.hidden = stale;
      });
      if (tgtSel.selectedOptions[0] && tgtSel.selectedOptions[0].disabled) tgtSel.value = '';
    }

    curSel.addEventListener('change', () => {
      curOther.style.display = curSel.value === '__other__' ? 'block' : 'none';
      if (curSel.value === '__other__') curOther.focus();
      filterTargetOptions();
    });
    tgtSel.addEventListener('change', () => {
      tgtOther.style.display = tgtSel.value === '__other__' ? 'block' : 'none';
      if (tgtSel.value === '__other__') tgtOther.focus();
    });

    document.getElementById('go_' + nodeId).addEventListener('click', () => {
      let curVal = curSel.value;
      if (curVal === '__other__') { curVal = curOther.value.trim(); }
      let tgtVal = tgtSel.value;
      if (tgtVal === '__other__') { tgtVal = tgtOther.value.trim(); }
      if (!curVal || !tgtVal) return;
      const errEl = document.getElementById('err_' + nodeId);
      const errMsg = versionOrderIssue(curVal, tgtVal);
      if (errMsg) {
        if (errEl) { errEl.textContent = '⚠️ ' + errMsg; errEl.style.display = 'block'; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      answers.currentVersion = curVal;
      answers.targetVersion = tgtVal;
      progressLog.push({ q: 'Current version', a: curVal });
      progressLog.push({ q: 'Target version', a: tgtVal });
      renderSidebar();
      advance(node, node.next);
    });
  } else if (node.type === 'upgrade-combo') {
    const depCards = Array.from(mainInner.querySelectorAll('#depGrid_' + nodeId + ' .opt-card'));
    const modeRow = document.getElementById('modeRow_' + nodeId);
    const modeCards = Array.from(mainInner.querySelectorAll('#modeGrid_' + nodeId + ' .opt-card'));
    const curSel = document.getElementById('sel_' + nodeId + '_current');
    const curOther = document.getElementById('sel_' + nodeId + '_current_other');
    const tgtSel = document.getElementById('sel_' + nodeId + '_target');
    const tgtOther = document.getElementById('sel_' + nodeId + '_target_other');
    let selectedDep = null, selectedMode = null;

    function filterTargetOptions() {
      const curVal = curSel.value === '__other__' ? '' : curSel.value;
      const curIdx = ALL_VERSIONS.indexOf(curVal);
      Array.from(tgtSel.options).forEach(o => {
        if (o.value === '' || o.value === '__other__') { o.disabled = false; o.hidden = false; return; }
        const idx = ALL_VERSIONS.indexOf(o.value);
        const stale = curIdx !== -1 && idx !== -1 && idx <= curIdx;
        o.disabled = stale; o.hidden = stale;
      });
      if (tgtSel.selectedOptions[0] && tgtSel.selectedOptions[0].disabled) tgtSel.value = '';
    }

    depCards.forEach(card => {
      card.addEventListener('click', () => {
        selectedDep = card.getAttribute('data-dep');
        depCards.forEach(c => c.classList.toggle('selected', c === card));
        modeRow.style.display = selectedDep === 'Standalone' ? '' : 'none';
      });
    });
    modeCards.forEach(card => {
      card.addEventListener('click', () => {
        selectedMode = card.getAttribute('data-mode');
        modeCards.forEach(c => c.classList.toggle('selected', c === card));
      });
    });
    curSel.addEventListener('change', () => {
      curOther.style.display = curSel.value === '__other__' ? 'block' : 'none';
      if (curSel.value === '__other__') curOther.focus();
      filterTargetOptions();
    });
    tgtSel.addEventListener('change', () => {
      tgtOther.style.display = tgtSel.value === '__other__' ? 'block' : 'none';
      if (tgtSel.value === '__other__') tgtOther.focus();
    });

    document.getElementById('go_' + nodeId).addEventListener('click', () => {
      const errEl = document.getElementById('err_' + nodeId);
      const showErr = (msg) => { errEl.textContent = '⚠️ ' + msg; errEl.style.display = 'block'; };
      if (!selectedDep) { showErr('Select Standalone or Automation Suite.'); return; }
      let curVal = curSel.value;
      if (curVal === '__other__') curVal = curOther.value.trim();
      let tgtVal = tgtSel.value;
      if (tgtVal === '__other__') tgtVal = tgtOther.value.trim();
      if (!curVal || !tgtVal) { showErr('Select both a current and target version.'); return; }
      const verErr = versionOrderIssue(curVal, tgtVal);
      if (verErr) { showErr(verErr); return; }
      if (selectedDep === 'Standalone' && !selectedMode) { showErr('Select In-place or Side-by-side.'); return; }
      errEl.style.display = 'none';

      answers.deployType = selectedDep;
      answers.currentVersion = curVal;
      answers.targetVersion = tgtVal;
      if (selectedDep === 'Standalone') answers.mode = selectedMode;

      progressLog.push({ q: 'Deployment type', a: selectedDep });
      progressLog.push({ q: 'Current version', a: curVal });
      progressLog.push({ q: 'Target version', a: tgtVal });
      if (selectedDep === 'Standalone') progressLog.push({ q: 'Upgrade mode', a: selectedMode });
      renderSidebar();

      advance(node, selectedDep === 'Standalone' ? 'TERM_STANDALONE_UPGRADE' : 'TERM_AS_UPGRADE');
    });
  } else if (node.type === 'text') {
    document.getElementById('go_' + nodeId).addEventListener('click', () => {
      const val = document.getElementById('txt_' + nodeId).value.trim();
      if (!val) return;
      answers[node.answerKey] = val;
      progressLog.push({ q: node.shortQ || node.question, a: val });
      renderSidebar();
      advance(node, node.next);
    });
  }
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.addEventListener('click', goBack);
}

function advance(node, next) {
  const nextId = typeof next === 'function' ? next(answers) : next;
  showNode(nextId);
}

function restart() {
  answers = {}; steps = []; progressLog = [];
  renderSidebar();
  showNode('start');
}
document.getElementById('restartBtn').addEventListener('click', restart);

/* ---------- Freshness indicator / Check for updates ---------- */
(function initFreshness() {
  const freshTextEl = document.getElementById('freshText');
  const updatedTextEl = document.getElementById('updatedText');
  function formatFreshDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }
  function formatUpdatedAt(iso) {
    const d = new Date(iso);
    const datePart = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    const timePart = d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    return datePart + ' · ' + timePart;
  }
  freshTextEl.textContent = 'Last verified ' + formatFreshDate(LAST_VERIFIED);
  if (updatedTextEl) updatedTextEl.textContent = 'Updated ' + formatUpdatedAt(LAST_UPDATED_AT);
})();

      warnHtml + actionBar() + versionizeDocLinks(renderFileBlock(MD.upgrade), a.targetVersion) + '</div>';
  }},
  TERM_AS_UPGRADE: { terminal: true, render: (a) => {
    const classicWarn = classicFolderUpgradeWarning(a.currentVersion, a.targetVersion);
    const ltsWarn = ltsSkipWarning(a.currentVersion, a.targetVersion);
    let warnHtml = '';
    if (classicWarn) warnHtml += '<div class="warn">⚠️ ' + classicWarn + '</div>';
    if (ltsWarn) warnHtml += '<div class="warn">⚠️ ' + ltsWarn + '</div>';
    return '<div class="result-card"><div class="result-header"><span class="ic">⬆️</span><h2>Automation Suite Upgrade</h2></div>' +
      scopeChips([(a.currentVersion || '?') + ' → ' + (a.targetVersion || '?')]) +
      warnHtml + actionBar() + versionizeDocLinks(renderFileBlock(MD.as), a.targetVersion) + '</div>';
  }},
  TERM_MIGRATION: { terminal: true, render: (a) => {
    let warn = '';
    const curIdx = ALL_VERSIONS.indexOf(a.currentVersion);
    const isPreClassicCutoff = a.currentVersion === 'pre-2021.10' || (curIdx !== -1 && curIdx < ALL_VERSIONS.indexOf('2023.4'));
    if (isPreClassicCutoff) {
      warn = '<div class="warn">⚠️ Current version is pre-2023.4' + (a.currentVersion === 'pre-2021.10' ? '' : ' (' + a.currentVersion + ')') + ' &mdash; if any Classic folders/robots still exist, Classic folders are not supported in Automation Cloud at all, and Orchestrator 2023.10+ blocks setup outright if Classic objects remain. If this migration is happening ahead of an on-prem upgrade, sequence it as: migrate/delete Classic folders first (Classic&rarr;Modern migration path), <strong>then</strong> upgrade &mdash; 2023.10+ setup will block on remaining classic objects otherwise.</div>';
    }
    let out = '<div class="result-card"><div class="result-header"><span class="ic">☁️</span><h2>Standalone → Automation Cloud Migration</h2></div>' +
      scopeChips([a.currentVersion, 'preserve data: ' + a.preserveData, 'custom configs: ' + a.customConfigs, 'SSO: ' + a.sso, 'credential stores: ' + a.credsUsed]) +
      warn + actionBar() + renderFileBlock(MD.migration);
    if (a.credsUsed === 'Yes') {
      out += '<h3 class="file-title">Since credential stores are involved, also see:</h3>' + renderFileBlock(MD.onboarding);
    }
    out += '</div>';
    return out;
  }},
  TERM_ONBOARD: { terminal: true, render: (a) => {
    return '<div class="result-card"><div class="result-header"><span class="ic">🔐</span><h2>Tenant / Credential Store Onboarding</h2></div>' +
      scopeChips([a.onboardKind, a.store]) + actionBar() + renderFileBlock(MD.onboarding) + '</div>';
  }},
  TERM_CLASSICMODERN: { terminal: true, render: (a) => {
    let warn = '';
    if (a.robotCount && a.robotCount.indexOf('Over 2,000') === 0) {
      warn = '<div class="warn">⚠️ Over 2,000 classic robots &mdash; the built-in migration wizard is not recommended at this scale. Plan a dedicated migration strategy instead of the self-service wizard.</div>';
    }
    if (a.currentVersion && ALL_VERSIONS.indexOf(a.currentVersion) !== -1 && ALL_VERSIONS.indexOf(a.currentVersion) < ALL_VERSIONS.indexOf('2023.10')) {
      warn += '<div class="warn">⚠️ Current version is pre-2023.10 &mdash; if this migration is happening ahead of an upgrade, sequence it as: migrate/delete classic folders first, then upgrade. 2023.10+ setup will block on remaining classic objects otherwise.</div>';
    }
    return '<div class="result-card"><div class="result-header"><span class="ic">🗂️</span><h2>Classic → Modern Folder Migration</h2></div>' +
      scopeChips([a.currentVersion, a.robotCount]) + warn + actionBar() + renderFileBlock(MD.folders) + '</div>';
  }},
  TERM_TROUBLESHOOT: { terminal: true, render: (a) => {
    const q = (a.errorText || '').toLowerCase();
    const tokens = q.split(/[^a-z0-9]+/).filter(t => t.length > 2);
    // Crude singular/plural tolerance: also try the token with a trailing 's' stripped/added.
    function stemVariants(t) {
      const variants = [t];
      if (t.endsWith('s') && t.length > 3) variants.push(t.slice(0, -1));
      else variants.push(t + 's');
      return variants;
    }
    function fieldHasToken(fieldLower, t) {
      return stemVariants(t).some(v => fieldLower.indexOf(v) !== -1);
    }
    const scored = ERRORS.map(e => {
      const errLower = e.error.toLowerCase();
      const causeLower = (e.cause || '').toLowerCase();
      const fixLower = (e.fix || '').toLowerCase();
      const sourceLower = (e.source || '').toLowerCase();
      const keywordsLower = (e.keywords || []).map(k => k.toLowerCase());
      let score = 0;
      // Whole-phrase match against the curated title is the strongest signal.
      if (q.indexOf(errLower) !== -1 || errLower.indexOf(q) !== -1) score += 8;
      // Whole-phrase match against any keyword phrase is nearly as strong.
      keywordsLower.forEach(k => { if (q.indexOf(k) !== -1 || k.indexOf(q) !== -1) score += 6; });
      tokens.forEach(t => {
        if (fieldHasToken(errLower, t)) score += 3;
        else if (keywordsLower.some(k => fieldHasToken(k, t))) score += 3;
        else if (fieldHasToken(causeLower, t)) score += 2;
        else if (fieldHasToken(fixLower, t)) score += 1;
        if (fieldHasToken(sourceLower, t)) score += 1;
      });
      return { e, score };
    }).filter(x => x.score >= 5).sort((x, y) => y.score - x.score).slice(0, 5);

    let body = '';
    if (scored.length) {
      body += '<details class="section" open><summary>🐛 Likely matches<span class="chevron">▶</span></summary><div class="section-body">' +
        scored.map(({e}) => '<p><strong>' + e.error + '</strong> <em>(' + e.source + ')</em><br>Cause: ' + e.cause + '<br>Fix: ' + e.fix + '</p>').join('') +
        '</div></details>';
    } else {
      body += '<details class="section" open><summary>🧭 General gotchas to check<span class="chevron">▶</span></summary><div class="section-body"><ul>' +
        GOTCHAS.map(g => '<li>' + g + '</li>').join('') + '</ul></div></details>';
    }
    body += '<details class="section"><summary>🚨 Escalate to Engineering if<span class="chevron">▶</span></summary><div class="section-body"><ul>' +
      ESCALATE.map(x => '<li>' + x + '</li>').join('') + '</ul></div></details>';

    return '<div class="result-card"><div class="result-header"><span class="ic">🛠️</span><h2>Troubleshooting</h2></div>' +
      scopeChips(['"' + a.errorText + '"']) + actionBar() + body + '</div>';
  }}
};

restart();
</script>
</body>
</html>
