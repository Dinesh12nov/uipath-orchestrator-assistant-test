llation-guide-eks-aks/checking-the-infrastructure-prerequisites\n\n> **Correction:** earlier drafts referenced a script named `installUiPathAS.sh` with `--dry-run`/\n> plain invocation against `cluster_config.json`. That script name does not match current UiPath\n> documentation for either install path (the RKE2/Linux path uses `install-uipath.sh`; the\n> AKS/EKS/OpenShift path uses the `uipathctl` binary shown above).\n\n- [ ] **2.1** Monitor install progress\n- [ ] **2.2** Watch for pod failures during install:\n  ```bash\n  watch kubectl get pods -n uipath\n  ```\n\n### Phase 3 \u2014 Post-Install Validation\n\n- [ ] **3.1** Verify all pods Running/Completed:\n  ```bash\n  kubectl get pods -n uipath | grep -v \"Running\\|Completed\"\n  # Should return no results if healthy\n  ```\n\n- [ ] **3.2** Verify ArgoCD applications are Synced:\n  ```bash\n  kubectl get applications -n argocd\n  # All should show: SYNC STATUS = Synced, HEALTH STATUS = Healthy\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/managing-the-cluster-in-argocd\n\n- [ ] **3.3** Run the built-in health check:\n  ```bash\n  ./uipathctl health check --namespace uipath --versions versions.json\n  ```\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/upgrading-automation-suite\n\n- [ ] **3.4** Access the unified Automation Suite portal at `https://<fqdn>` \u2014 there are no\n  separate `/orchestrator_` or `/identity_` path prefixes like Standalone Orchestrator's IIS\n  virtual directories; all products live behind one portal, and you switch **organization**\n  inside it (an earlier draft's path-prefix claim didn't match the real access model and has\n  been corrected):\n  - Switch to the **Default** organization, username `orgadmin`, to reach org-level pages\n    (Orchestrator, etc.)\n  - Switch to the **Host** organization, username `admin`, for host-level administration\n  - Retrieve either password with:\n    ```bash\n    kubectl get secret platform-service-secrets -n <uipath> -o jsonpath='{.data.identity\\.hostAdminPassword}' | base64 -d ; echo\n    ```\n    (org admin and host admin share the same initial password by design)\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/accessing-automation-suite\n\n- [ ] **3.5** Check the other management UIs are reachable:\n  - ArgoCD: `https://alm.<fqdn>` \u2014 username `admin`, password via\n    `kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath=\"{.data.password}\" | base64 -d`\n  - Monitoring: `https://monitoring.<fqdn>/grafana`, `/metrics` (Prometheus), `/alertmanager`\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/accessing-automation-suite\n\n- [ ] **3.6** Run resource health check:\n  ```bash\n  kubectl get pods -n uipath -o wide\n  kubectl top nodes\n  kubectl top pods -n uipath\n  ```\n\n---\n\n## Upgrade Checklist (Automation Suite)\n\n### Pre-Upgrade\n\n- [ ] **Only relevant if your CURRENT version predates 2023.10: confirm no Classic folders/robots remain before upgrading to a 2023.10+ target.**\n  If you're already on 2023.10 or later today (e.g. 2023.10 \u2192 2024.10, or 2023.x \u2192 2025.x), Classic\n  folders cannot exist on your system \u2014 they'd have had to be migrated away already to reach your\n  current version \u2014 so this doesn't apply. Only for a customer still on a pre-2023.10 version\n  (2021.10/2022.4/2022.10/2023.4) targeting 2023.10+ for the first time: this blocks setup outright\n  if any classic objects are still present. Migrate to Modern folders and delete classic folders\n  first \u2014 see `references/classic-to-modern-folders.md`.\n- [ ] **Check the compatibility matrix** for your current \u2192 target AS version hop (not all version\n  hops are supported)\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/compatibility-matrix\n- [ ] **Download `versions.json` and `uipathctl`** for the version you're upgrading to\n- [ ] **Generate the latest `input.json`** (don't hand-edit a stale copy):\n  ```bash\n  ./uipathctl manifest get-revision\n  # or, to see all past revisions:\n  ./uipathctl manifest list-revisions\n  ```\n- [ ] **Back up the cluster and SQL/PostgreSQL database.** For AKS/EKS this means your configured\n  cluster backup solution (Velero-based, or \u2014 from AS 2025.10 onward \u2014 your cloud provider's native\n  AKS/EKS backup service) plus a SQL Server/PostgreSQL backup, **not** an etcd snapshot script (that\n  applies to the separate self-managed-RKE2 install path).\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/backing-up-and-restoring-the-cluster\n  \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/upgrading-automation-suite\n\n  > **Correction:** earlier drafts specified `./configureUiPathAS.sh etcd-snapshot` and \"backup\n  > cluster_config.json\" \u2014 both belong to the self-managed RKE2 path, not AKS/EKS/OpenShift.\n- [ ] **Confirm ArgoCD is healthy** \u2014 no stuck syncs:\n  ```bash\n  kubectl get applications -n argocd\n  ```\n- [ ] **Check node capacity** \u2014 upgrade requires headroom for rolling restarts\n\n### Upgrade Execution\n\n```bash\n# 1. Confirm the cluster is healthy before starting\n./uipathctl health check --namespace uipath --versions versions.json\n\n# 2. Put the cluster into maintenance mode (this causes downtime)\n./uipathctl cluster maintenance enable\n./uipathctl cluster maintenance is-enabled\n\n# 3. Take your backup here (cluster + SQL), then disable maintenance mode\n#    (maintenance mode must be OFF before the upgrade itself runs)\n./uipathctl cluster maintenance disable\n\n# 4. Run the upgrade\n./uipathctl cluster upgrade input.json --versions versions.json\n\n# 5. Confirm health after upgrade\n./uipathctl health check --namespace uipath --versions versions.json\n```\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/upgrading-automation-suite\n\n> **Correction:** earlier drafts used `./installUiPathAS.sh cluster_config.json --upgrade`. There is\n> no evidence of an installer script by that name or a bare `--upgrade` flag in current UiPath\n> documentation for this deployment path; the real command is `uipathctl cluster upgrade input.json\n> --versions versions.json`, wrapped in the maintenance-mode sequence above.\n>\n> Separately, upgrading the underlying Kubernetes infrastructure itself (AKS/EKS version) is **your**\n> responsibility, not something the Automation Suite installer does \u2014 follow your cloud provider's\n> standard cluster-upgrade process, respecting the N-1..N-3 compatibility window.\n\n### Post-Upgrade Validation\n\n- [ ] All ArgoCD apps: `Synced` + `Healthy`\n- [ ] All pods: `Running` or `Completed`\n- [ ] `./uipathctl health check --namespace uipath --versions versions.json` passes\n- [ ] Orchestrator portal accessible and version updated\n- [ ] Test Robot connection and job execution\n- [ ] Check for OOMKilled pods (memory pressure after upgrade):\n  ```bash\n  kubectl get pods -n uipath | grep OOMKill\n  kubectl describe pod <pod-name> -n uipath | grep -A5 \"OOMKilled\"\n  ```\n\n---\n\n## Common AS Errors & Fixes\n\n| Error | Cause | Fix |\n|---|---|---|\n| Pod `OOMKilled` | Memory limit too low | Increase memory requests/limits via your input.json/resource-override configuration and re-apply. This is standard Kubernetes remediation; UiPath doesn't publish per-pod memory tuning tables, so confirm the right override mechanism for the affected component before changing values. |\n| ArgoCD sync loop | Self-heal fighting a manual patch | Disable self-heal on the affected ArgoCD Application before patching; re-enable after. Standard ArgoCD administration \u2014 see UiPath's cluster/ArgoCD management doc. \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/managing-the-cluster-in-argocd |\n| `redisenterpriseclusters not found` / Redis probe failure | Redis Enterprise cluster lost contact with more than half its nodes, or CRDs/finalizers are stuck | This is a documented UiPath procedure \u2014 see **Redis Cluster Recovery** below rather than improvising finalizer removal. \ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2023.10/installation-guide/redis-probe-failure |\n| `MetadataAddress must use HTTPS` | Identity/OIDC metadata endpoint being called over HTTP instead of HTTPS | **Unverified for Automation Suite specifically** \u2014 this error is documented for standalone Orchestrator/Identity Server (ASP.NET Core OIDC `RequireHttpsMetadata`), but the specific internal cluster URL and \"wrong path prefix\" root cause claimed in an earlier draft could not be confirmed against Automation Suite docs. Don't apply the internal URL fix from the earlier draft as-is \u2014 check the current Identity Server troubleshooting doc for your AS version and confirm FQDN/redirect URI configuration is HTTPS end-to-end. \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.4/installation-guide/identity-server-troubleshooting |\n| Persistent Volume stuck `Pending` | StorageClass not set as default | `kubectl patch storageclass <name> -p '{\"metadata\": {\"annotations\":{\"storageclass.kubernetes.io/is-default-class\":\"true\"}}}'` \u2014 standard Kubernetes administration, not AS-specific |\n| Image pull `ErrImagePull` | Registry credentials expired/incorrect | Update credentials under `registries.docker` / `registries.helm` in `input.json` and re-apply (`uipathctl manifest apply input.json --versions versions.json`) |\n\n## Redis Cluster Recovery (Documented Procedure \u2014 Redis Probe Failure)\n\nThis is UiPath's own documented recovery procedure for Redis probe failures, not a customer-specific\nrunbook \u2014 an earlier draft of this doc labeled it \"BofA Pattern,\" which is unverifiable/unjustified\ncustomer attribution and has been removed. Source:\n\ud83d\udcd6 https://docs.uipath.com/automation-suite/automation-suite/2023.10/installation-guide/redis-probe-failure\n\n**Description:** the Redis probe can fail if the node ID file doesn't exist (pod not yet\nbootstrapped). There is also an automatic recovery job \u2014 do **not** run the manual steps below while\nthat job is already running. This same manual procedure applies when a Redis Enterprise cluster\nloses contact with more than half its nodes (node failure or network split) and pods fail to rejoin.\n\n```bash\n# 1. Disable ArgoCD self-heal on all three related applications\nkubectl -n argocd patch application fabric-installer --type=json \\\n  -p '[{\"op\":\"replace\",\"path\":\"/spec/syncPolicy/automated/selfHeal\",\"value\":false}]'\nkubectl -n argocd patch application redis-cluster --type=json \\\n  -p '[{\"op\":\"replace\",\"path\":\"/spec/syncPolicy/automated/selfHeal\",\"value\":false}]'\nkubectl -n argocd patch application redis-operator --type=json \\\n  -p '[{\"op\":\"replace\",\"path\":\"/spec/syncPolicy/automated/selfHeal\",\"value\":false}]'\n\n# 2. Delete the Redis database and cluster resources, then remove their finalizers\nkubectl delete redb -n redis-system redis-cluster-db --force --grace-period=0 &\nkubectl delete rec -n redis-system redis-cluster --force --grace-period=0 &\nkubectl patch redb -n redis-system redis-cluster-db --type=json \\\n  -p '[{\"op\":\"remove\",\"path\":\"/metadata/finalizers\",\"value\":\"finalizer.redisenterprisedatabases.app.redislabs.com\"}]'\nkubectl patch rec redis-cluster -n redis-system --type=json \\\n  -p '[{\"op\":\"remove\",\"path\":\"/metadata/finalizers\",\"value\":\"redbfinalizer.redisenterpriseclusters.app.redislabs.com\"}]'\n\n# 3. Force-delete the services-rigger pod and the redis-cluster-0/1/2 pods\nkubectl -n redis-system get pods | grep services-rigger | awk '{print $1}' | xargs kubectl -n redis-system delete pod --force\nkubectl -n redis-system get pods | grep -E \"redis-cluster-[0-2]\" | awk '{print $1}' | xargs kubectl -n redis-system delete pod --force\n\n# 4. Re-enable ArgoCD self-heal\nkubectl -n argocd patch application fabric-installer --type=json \\\n  -p '[{\"op\":\"replace\",\"path\":\"/spec/syncPolicy/automated/selfHeal\",\"value\":true}]'\nkubectl -n argocd patch application redis-cluster --type=json \\\n  -p '[{\"op\":\"replace\",\"path\":\"/spec/syncPolicy/automated/selfHeal\",\"value\":true}]'\nkubectl -n argocd patch application redis-operator --type=json \\\n  -p '[{\"op\":\"replace\",\"path\":\"/spec/syncPolicy/automated/selfHeal\",\"value\":true}]'\n\n# 5. Trigger the recovery job manually\nkubectl -n redis-system create job --from=cronjob/redis-cluster-recovery-job cronjob-manual-run\n```\n\nIf the issue persists after this, check for **clock skew** between Kubernetes nodes \u2014 Redis pods\nfail to run on a node whose clock is even a few seconds off. Sync all node clocks (NTP/chrony) and\nretry.\n\n> **Correction:** the earlier draft's version of this procedure only patched the `redis-cluster`\n> ArgoCD application (omitting `fabric-installer` and `redis-operator`), omitted the pod\n> force-deletion step for `services-rigger` and `redis-cluster-0/1/2`, and used a different manual\n> job name (`manual-recovery` instead of the documented `cronjob-manual-run`). Those omissions can\n> leave the recovery incomplete \u2014 the sequence above matches UiPath's published steps exactly.\n\n---\n\n## Reference Links\n\n> UiPath's Automation Suite docs are version-pinned in the URL (e.g. `.../automation-suite/2024.10/...`)\n> \u2014 there is no `/automation-suite/latest/` path. Swap `2024.10` for your installed version/CU when\n> following these links, and note EKS/AKS and OpenShift have separate guide trees\n> (`installation-guide-eks-aks` vs `installation-guide-openshift`).\n\n- AS on EKS/AKS install guide: https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/installing-automation-suite\n- AS on OpenShift install guide: https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-openshift/installing-automation-suite\n- AS on EKS/AKS upgrade guide: https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/upgrading-automation-suite\n- Kubernetes cluster and node requirements: https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/kubernetes-cluster-and-nodes\n- Compatibility matrix (K8s versions, third-party components): https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/compatibility-matrix\n- Troubleshooting (EKS/AKS): https://docs.uipath.com/automation-suite/automation-suite/2024.10/installation-guide-eks-aks/troubleshooting\n- Redis probe failure (self-managed RKE2 guide, same procedure applies): https://docs.uipath.com/automation-suite/automation-suite/2023.10/installation-guide/redis-probe-failure\n",
  migration: "# Standalone Orchestrator \u2192 Automation Cloud Migration Guide\n\n## Scope\nMigration from self-hosted Standalone Orchestrator to UiPath Automation Cloud (SaaS).\nCovers data migration, Robot reconnection, license transfer, and cutover planning.\n\nStart with UiPath's official tooling \u2014 don't jump to the manual checklist below.\n\n### Official migration paths (use one of these first)\n\n1. **Automation Cloud Migration Tool** (recommended) \u2014 a downloadable desktop app that connects to your Standalone Orchestrator and automatically exports/imports most entities into your cloud tenant: folders, machines, packages, libraries, calendars, queues, processes, robots, environment associations, triggers (imported disabled), and most assets.\n   \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/using-the-migration-tool\n\n2. **Manual migration** \u2014 UiPath's documented step-by-step process for manually recreating a Standalone tenant in Cloud Orchestrator.\n   \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/manual-migration\n\n   Overview: \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/about-migrating-to-automation-cloud\n\n### Not in scope of Cloud Migration\n\n| Entity / Item | Notes |\n|---|---|\n| User/robot accounts | Not migrated \u2014 role assignments included |\n| Queue items | Not migrated |\n| Action catalogs | Not migrated |\n| Webhooks | Not migrated |\n| Testing entities | Not migrated |\n| Storage buckets | Not migrated |\n| Logs and tasks | Not migrated |\n| Machine keys | Not migrated |\n| Personal workspace folders | Not migrated |\n| Cutover execution | Not performed by the tool \u2014 manual step |\n\n### Entities that migrate only partially\n\n| Entity | Limitation |\n|---|---|\n| Settings | Passwords/secrets always excluded \u2014 re-enter manually |\n| Packages | Feeds using external/custom auth are excluded |\n| Libraries | Only tenant-level migrate, not folder-scoped |\n| Triggers | Imported disabled, without per-robot configuration |\n\n> **Note:** This checklist is a general guide for the cloud migration process and does not account for specific customer requests or environment issues. Please review recommendations before sharing.\n\n---\n\n## Migration Decision Matrix\n\nBefore starting, answer these:\n\n| Question | If YES | If NO |\n|---|---|---|\n| Is your on-prem Orchestrator on a supported version, on Windows, and do you have a **dedicated user account** (not a robot account) with admin rights and **View permission on every folder being migrated** \u2014 the tool's folder export silently fails for folders that account can't see \u2014 plus enough cloud robot licenses for all robots being migrated? | Use the **Automation Cloud Migration Tool** as your primary method (\ud83d\udcd6 [using-the-migration-tool](https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/using-the-migration-tool)) | Fall back to full **Manual Migration** (\ud83d\udcd6 [manual-migration](https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/manual-migration)) |\n| Do you need to preserve historical job/queue data? | Plan data export \u2014 queue items, logs, and storage buckets are **not** migrated by either official path | Simple cutover possible |\n| Do you have custom Orchestrator configurations? | Document all settings first | Standard migration |\n| Are you still on **Classic Folders**? | Migrate to Modern Folders **before** migrating to cloud \u2014 Classic Folders are not supported in cloud platforms. \ud83d\udcd6 https://docs.uipath.com/overview/other/latest/overview/classic-folders-removal | Proceed with migration |\n| Do you use **Machine Templates with robot-account or unattended-user-account mappings**? | **Known failure mode** \u2014 pre-create/pre-provision each mapped account at the **tenant level** (Manage Access) in the destination Cloud org *before* running the Migration Tool. Existing only at the org level is not sufficient \u2014 this is the most common real-world migration failure, surfacing as the literal error `Some of the robots provided do not exist`. \ud83d\udcd6 Internal reference: \"UiPath Automation Cloud Migration Runbook\" (DOC-26901 / PLT-100541) | No account-mapped machine templates \u2014 lower risk here |\n| Are Robots on standard Windows VMs or VDI (not physical/bare-metal machines)? | Standard case \u2014 reconnect robots to the new cloud Orchestrator URL/machine key as usual, no special handling needed | Physical/non-standard machines may need extra cloud robot licensing or setup verification before migrating |\n| Are you using Standalone Identity Server with SSO (Azure AD/SAML)? | SSO does **not** carry over automatically \u2014 reconfigure SSO separately in Automation Cloud's Admin \u2192 Security settings after migration | No SSO reconfiguration needed \u2014 standard cloud login applies |\n| Do you use credential stores (CyberArk/Azure Key Vault)? | Credential store config does **not** migrate automatically \u2014 read `cloud-onboarding.md` and re-integrate the credential store in Automation Cloud after migration | No credential store reconfiguration needed |\n| Is your current Standalone version still supported per UiPath's Product Lifecycle (not past End of Life)? | Good \u2014 proceed with migration once other checks above are cleared | Upgrade Standalone to a supported version **first**, then migrate \u2014 do not migrate directly from an unsupported/EOL version |\n| Current version older than **22.10**? | The Modern Folder migration wizard has only been available since Orchestrator 22.10 (not just 2023.10+) \u2014 upgrade to at least 22.10 first, migrate Classic folders to Modern, **then** proceed with the Cloud migration | Modern Folder migration is already available; proceed once Classic folders (if any) are resolved |\n| Does your network currently restrict outbound traffic by firewall? | Confirm the required FQDN allowlist (`cloud.uipath.com:443`, `*.service.signalr.net:443`, plus region-specific relay/tunnel hosts) is in place **before** cutover \u2014 robots and users can't reach Automation Cloud otherwise. Also check whether your firewall rules are IP-based: UiPath is transitioning to unified outbound IP ranges, with a **September 16, 2026** deadline to add the new ranges alongside the legacy ones (don't remove legacy ranges until a later release note confirms it's safe). \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/configuring-the-firewall-for-cloud | Standard migration, but still confirm outbound HTTPS (443) isn't blocked by default |\n\n---\n\n## Migration Checklist\n\n### Phase 1 \u2014 Pre-Migration Inventory (Source \u2014 Standalone)\n\nDocument everything from the existing Standalone Orchestrator. If you're using the Migration Tool, most of this is captured automatically during its export step \u2014 this list is primarily for the manual path or for verifying the tool's export summary:\n\n- [ ] **1.1** Export Tenants list (names, user counts, folder structure)\n- [ ] **1.2** Export/note all Packages (names, versions) from `Storage` folder or NuGet feed\n- [ ] **1.3** Export Assets list (names, types, folder assignments) \u2014 DO NOT export values for credentials\n- [ ] **1.4** Export Queues (names, SLA settings, folder assignments)\n- [ ] **1.5** Export all Process/Schedule configurations\n- [ ] **1.6** List all Machines and connected Robot machines (hostnames) \u2014 \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/about-machines\n- [ ] **1.7** List all Users and their roles \u2014 note that user/robot accounts and role assignments are **not** migrated by the Migration Tool and must be recreated\n- [ ] **1.8** Note all Webhook configurations (not migrated by the Migration Tool \u2014 \ud83d\udcd6 [entities not migrated](https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/using-the-migration-tool#entities-not-migrated-by-the-migration-tool))\n- [ ] **1.9** Note current license counts (Unattended, Attended, Studio, etc.)\n- [ ] **1.10** Screenshot all custom Settings (Orchestrator \u2192 Settings)\n- [ ] **1.11** Note SMTP configuration (host, port, auth) \u2014 needed for cloud setup\n- [ ] **1.12** Document any external integrations (Jira, ServiceNow, etc.)\n\n### Phase 2 \u2014 Prepare Automation Cloud Tenant\n\n- [ ] **2.0** If using the Migration Tool: temporarily disable any active organizational\n  policies in Automation Cloud that could interfere with the import step (they can block\n  entity creation mid-import) \u2014 re-enable them once migration is complete.\n  \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/using-the-migration-tool\n- [ ] **2.1** Provision Automation Cloud tenant at `https://cloud.uipath.com`\n- [ ] **2.1a** If any Machine Template maps to a robot account or an unattended-user account,\n  inventory every one of those mappings and pre-create/pre-provision each account at the\n  **tenant level** (Manage Access) in this Cloud org before migrating machines \u2014 existing only\n  at the org level is not sufficient. This is the single most common real-world migration\n  failure; skipping it surfaces as `Some of the robots provided do not exist` during the\n  machine/template migration step. \ud83d\udcd6 Internal reference: \"UiPath Automation Cloud Migration\n  Runbook\" (DOC-26901 / PLT-100541); real case illustration: \"TLG - Cloud Migration\"\n- [ ] **2.2** Activate licenses \u2014 confirm seat counts match or exceed Standalone (see **License Transfer** below)\n- [ ] **2.3** Configure SSO/Identity (Azure AD/Entra ID, SAML) if used\n  - Navigate: Admin \u2192 Organization \u2192 Security \u2192 Authentication settings \u2014 \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/setting-up-saml-sso-with-azure-ad\n- [ ] **2.4** Recreate Folder structure in cloud Orchestrator (or let the Migration Tool do this)\n- [ ] **2.5** Invite users and assign roles (or sync via Azure AD/Entra ID groups) \u2014 not handled by the Migration Tool\n- [ ] **2.6** Configure SMTP if email notifications required:\n  - Admin \u2192 your org \u2192 **Mail Settings** page (live docs confirm this is the current label, not \"System email notifications\") \u2014 \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/configuring-system-email-notifications\n\n### Phase 3 \u2014 Migrate Packages\n\nIf using the Migration Tool, packages and package versions are migrated automatically (with the exception of feeds requiring external authentication). For the manual path, packages can be uploaded via the Orchestrator UI or via the Orchestrator API:\n\n```powershell\n# Option A \u2014 Manual: Upload packages via Orchestrator UI\n# Orchestrator \u2192 Packages \u2192 Upload (.nupkg files, 30 MB size limit by default)\n# \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-packages\n\n# Option B \u2014 API bulk upload (PowerShell)\n# Endpoint and multipart/form-data usage below are documented informally by UiPath/community\n# (see Orchestrator API guide + Swagger definition for your tenant to confirm current behavior):\n# \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/api-guide/packages-requests\n# Note: this endpoint has historically required that an OLDER version of the package\n# already exists in the target Orchestrator \u2014 verify against your tenant's Swagger spec\n# before relying on it for a first-time bulk upload.\n$orchestratorUrl = \"https://cloud.uipath.com/<org>/<tenant>/orchestrator_\"\n$headers = @{ \"Authorization\" = \"Bearer <token>\" }\n$packages = Get-ChildItem \"C:\\Backup\\Packages\" -Filter \"*.nupkg\"\nforeach ($pkg in $packages) {\n    $form = @{ file = Get-Item $pkg.FullName }\n    Invoke-RestMethod -Uri \"$orchestratorUrl/odata/Processes/UiPath.Server.Configuration.OData.UploadPackage\" `\n        -Method POST -Headers $headers -Form $form\n}\n```\n\n- [ ] **3.1** Upload all NuGet packages to cloud Orchestrator (or verify Migration Tool import summary)\n- [ ] **3.2** Verify package versions match source\n- [ ] **3.3** Recreate Process configurations linked to uploaded packages\n\n### Phase 4 \u2014 Migrate Assets & Queues\n\n> \u26a0\ufe0f **Credential assets**: Never export credential values \u2014 recreate them manually in cloud. The Migration Tool migrates most asset types but does **not** migrate per-user asset values in modern folders.\n\n- [ ] **4.1** Recreate all text/integer/boolean assets in cloud (Migration Tool handles this automatically, or use the Assets API for a manual bulk import) \u2014 \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-assets-in-orchestrator\n- [ ] **4.2** Recreate credential assets \u2014 enter values fresh (do not copy from source)\n- [ ] **4.3** Recreate all Queues with same SLA settings\n- [ ] **4.4** Recreate Schedules / Triggers \u2014 note triggers imported by the Migration Tool are created **disabled** and must be manually re-enabled\n\n### Phase 5 \u2014 Reconnect Robots\n\nRobots can only be connected to **one** Orchestrator at a time \u2014 connecting a Robot to the cloud tenant automatically disconnects it from the on-prem Orchestrator and consumes a new cloud license. \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/manual-migration#manually-recreating-your-orchestrator-setup \u2014 machine keys are **not** migrated by the Migration Tool, so this step is always manual regardless of which path you used.\n\nFor **each Robot machine**:\n\n- [ ] **5.1** Ensure the machine is not running active jobs, then disconnect the Robot from the source Orchestrator via UiPath Assistant \u2192 Preferences \u2192 Orchestrator Settings, or via CLI (`UiRobot.exe disconnect`) \u2014 **no need to uninstall** the Robot\n- [ ] **5.2** Connect the Assistant to the cloud tenant. Note: the live \"Connecting Robots to\n  Orchestrator\" doc currently documents **Service URL** (interactive sign-in) and **Client ID**\n  (client credentials) as the two Assistant connection types \u2014 \"Machine Key\" is no longer shown\n  as a distinct selectable option in the Assistant UI, though the concept survives via Hybrid\n  auth mode and the CLI `--key` flag below. Use whichever connection type matches your Robot's\n  auth mode (Hybrid machines still use a machine key under the hood):\n  - Orchestrator URL: `https://cloud.uipath.com/<org>/<tenant>/`\n  - Machine Key (Hybrid/CLI path): copy from cloud Orchestrator \u2192 Tenant \u2192 Machines \u2192 [Machine object] \u2192 Machine Key\n  - \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/robot-authentication\n- [ ] **5.3** In cloud Orchestrator, ensure the Machine object and Robot/user account are added to the target folder\n- [ ] **5.4** Verify Robot shows as **Connected**/**Available** in cloud Orchestrator monitoring\n- [ ] **5.5** Run a test process on the reconnected Robot\n\n**Robot reconnection via CLI (on each Robot machine):**\n```powershell\n# Correct UiRobot.exe CLI syntax (verified against Robot CLI docs):\n# \ud83d\udcd6 https://docs.uipath.com/robot/standalone/latest/admin-guide/command-line-interface\n$cloudUrl = \"https://cloud.uipath.com/<org>/<tenant>/\"\n$machineKey = \"<machine-key-from-cloud-orchestrator>\"\n\n# Note: exact install path varies by install mode\n# (Service Mode: %ProgramFiles%\\UiPath\\...; User Mode: %LocalAppData%\\Programs\\UiPath\\...)\n# \u2014 confirm the path on your target machine before scripting this at scale.\n& \"C:\\Program Files\\UiPath\\Robot\\UiRobot.exe\" connect --url $cloudUrl --key $machineKey\n\n# To disconnect from the old Orchestrator first (optional \u2014 connecting to a new\n# Orchestrator switches the connection automatically):\n# UiRobot.exe disconnect --wait\n```\n\n### Phase 6 \u2014 Cutover\n\n- [ ] **6.1** Choose cutover window (low-activity period)\n- [ ] **6.2** Stop all schedules/triggers on Standalone Orchestrator\n- [ ] **6.3** Wait for all active jobs to complete (or gracefully stop)\n- [ ] **6.4** Enable schedules/triggers in cloud Orchestrator (remember: Migration Tool imports triggers as disabled)\n- [ ] **6.5** Redirect users to cloud Orchestrator URL\n- [ ] **6.6** Update any hardcoded Orchestrator URLs in Robot processes\n- [ ] **6.7** Run full smoke test (trigger each critical process once)\n- [ ] **6.8** Keep Standalone Orchestrator running in read-only mode for a defined rollback window (e.g., 2 weeks) as a project decision \u2014 this is general practice, not a UiPath-documented requirement\n\n### Phase 7 \u2014 Post-Migration Validation\n\n- [ ] All Robots connected and showing **Online** in cloud\n- [ ] All Processes visible and executable\n- [ ] All Assets retrievable (test via Robot process)\n- [ ] Schedules running at expected times\n- [ ] Email notifications working\n- [ ] SSO login working for all users\n- [ ] Historical data accessible (if migrated \u2014 note queue items, logs, and storage buckets are not migrated by either official path)\n- [ ] License consumption within expected range\n- [ ] If using the Migration Tool: manually complete its documented post-migration tasks (allocate licenses, upload library feeds, create skipped robots, recreate webhooks/task catalogs/credential stores, connect robots, enable triggers, re-enter passwords) \u2014 \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/using-the-migration-tool#post-migration-tasks\n\n---\n\n## License Transfer\n\nCloud licenses are **not** activated using a Standalone deactivation key. The real process:\n\n```\n1. Contact your UiPath Account Team / Support to request a cloud License Code\n   sized to match your Standalone entitlement (named user vs. concurrent/unattended\n   robot counts may need to be re-quoted if the license type changes).\n   \ud83d\udcd6 https://customerportal.uipath.com/support/add-case\n2. In Automation Cloud: Admin \u2192 Licenses \u2192 Enterprise Activation \u2192 paste the License Code \u2192 Activate.\n   \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/activating-your-license\n3. Allocate licenses to tenants and users as needed.\n   \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/allocating-licenses-to-tenants\n```\n\n> **Note:** UiPath can issue a temporary license key that extends a trial period specifically to cover the migration window, so the same product license can effectively be used on both Standalone and Cloud while cutover is in progress \u2014 request this from Support/your Account Team rather than assuming a self-service deactivation/reactivation flow. \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/about-migrating-to-automation-cloud#setup-before-migration\n>\n> The Standalone Orchestrator **offline deactivation/activation** flow (Settings \u2192 License \u2192 Deactivate, producing a file uploaded at the Activation Portal) is a real UiPath feature, but it is designed for transferring a license between two on-prem/offline Orchestrator instances \u2014 not for provisioning Automation Cloud. \ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2023.10/user-guide/managing-your-host-license\n\n---\n\n## Rollback Plan\n\nIf migration fails during cutover:\n1. Stop all cloud Orchestrator jobs\n2. Re-enable IIS on Standalone Orchestrator server\n3. Reconnect Robots to Standalone (restore original Machine Key) \u2014 remember Robots can only be connected to one Orchestrator at a time, so this will disconnect them from cloud\n4. Resume operations on Standalone\n5. Investigate and reattempt migration after fixing root cause\n\n---\n\n## Common Migration Errors\n\n| Error | Cause | Fix |\n|---|---|---|\n| Robot shows `Disconnected` after reconnect | Machine not added to the target folder | Add the Machine object to the target folder in cloud \u2014 \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/about-machines |\n| `An unattended robot has not been configured` | Domain credentials not set for the robot account | Set `domain\\username` + password on the Robot/Machine mapping in the target folder \u2014 \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/robot-authentication |\n| Asset not found errors in Robot | Asset not recreated in cloud | Recreate missing asset in cloud; verify folder assignment |\n| Package not found | Upload failed or wrong folder | Re-upload package; check folder assignment |\n| SSO login fails | Redirect URI mismatch | Update Reply URL in Azure AD/Entra ID app registration to include the cloud URL \u2014 \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/setting-up-saml-sso-with-azure-ad |\n| `Some of the robots provided do not exist` during machine/template migration | A Machine Template's account mapping (robot account or unattended-user account) exists at the org level but was never pre-created at the **tenant level** (Manage Access) in the destination Cloud tenant | Pre-create/pre-provision the mapped account at the tenant level before re-running the migration step \u2014 see Phase 2.1a |\n\n---\n\n## Internal Case Patterns & Known Issues (Confluence-sourced)\n\nRecurring patterns pulled from internal UiPath Confluence pages (Support Knowledge Base and Site\nReliability spaces), useful for sanity-checking a migration plan even when the customer's\nsituation looks \"standard\":\n\n- **\"Some of the robots provided do not exist\"** \u2014 the most frequently recurring real failure,\n  root-caused every time to a Machine Template account mapping that exists at the org level but\n  was never pre-created at the tenant level. Seen in at least two distinct real cases with\n  different mapping styles (robot account; local unattended-user account). *(Source: \"UiPath\n  Automation Cloud Migration Runbook\", \"TLG - Cloud Migration\")*\n- **Silent failures leaving stale status** \u2014 the migration tool can report a misleading\n  \"in progress\" or partially-successful state rather than a clear failure; verify actual entity\n  counts in the destination tenant rather than trusting the tool's own status indicator alone.\n  *(Source: \"Region Migration Case Studies\")*\n- **Org-before-tenant dependency** \u2014 org-level setup (policies, license provisioning, account\n  pre-creation) repeatedly turns out to be the actual blocker on cases scoped as \"just a tenant\n  migration.\" Treat org-level readiness as a hard prerequisite gate, not a parallel task.\n  *(Source: \"Region Migration Case Studies\")*\n- **AI Center, IXP, Maestro, and Data Unit content, plus audit logs, are not portable** between\n  environments/regions \u2014 plan these separately rather than assuming they migrate.\n  *(Source: \"Region Migration Case Studies\")*\n- **Scale-unit and plan-tier mismatches** between source and destination region/tenant have\n  caused real project delays when not checked up front. *(Source: \"Region Migration Case\n  Studies\")*\n- **Realistic project timelines** for non-trivial cloud migrations in documented cases ranged\n  from about 15 to 70+ days \u2014 set customer expectations accordingly rather than promising a\n  single-weekend cutover. *(Source: \"Region Migration Case Studies\")*\n\n---\n\n## Reference Links\n\n- About migrating to a cloud platform: https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/about-migrating-to-automation-cloud\n- Using the Automation Cloud Migration Tool: https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/using-the-migration-tool\n- Manual migration: https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/manual-migration\n- Robot connectivity (cloud): https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/connecting-robots-to-orchestrator\n- Robot Command Line Interface: https://docs.uipath.com/robot/standalone/latest/admin-guide/command-line-interface\n- Activating your Enterprise license: https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/activating-your-license\n- Allocating licenses to tenants: https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/allocating-licenses-to-tenants\n- Configuring the firewall for Automation Cloud (FQDN allowlist, unified IP ranges, Sept 2026 transition): https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/configuring-the-firewall-for-cloud\n",
  onboarding: "# Automation Cloud \u2014 Multi-Tenant Onboarding & Credential Stores\n\n## Scope\nOnboarding new tenants/branches to Automation Cloud (including APAC multi-country patterns),\nand configuring credential stores (CyberArk CCP, Azure Key Vault, HashiCorp Vault, BeyondTrust).\n\n---\n\n## Multi-Tenant Onboarding Checklist\n\n> The real portal flow is: **Admin \u2192 Tenants view \u2192 click the \"+\" (plus) icon \u2192 Create new tenant**\n> (General step \u2192 Region/plan step \u2192 review). Exact menu labels can shift between UI releases, so\n> treat the steps below as a checklist of *what* to configure, not a pixel-accurate click-path \u2014 verify\n> against the live product. \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/managing-tenants\n> \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/about-tenants\n>\n> Note: creating additional tenants is a **Flex Pro / Enterprise** capability \u2014 Community and Free Flex\n> organizations are limited to the single auto-created `DefaultTenant`.\n\n### New Tenant Setup\n\n- [ ] **1.1** Admin \u2192 Tenants \u2192 \"+\" (Add Tenant)\n  - Name: use consistent naming convention (e.g., `APAC_Singapore`, `EMEA_London`); up to 32\n    alphanumeric characters, starting with a letter, no spaces/special characters\n  - Region: select closest region available on your plan\n- [ ] **1.2** Assign licenses to new tenant:\n  - Admin \u2192 select tenant \u2192 allocate licenses for the services you provision\n  - Allocate: Unattended Robot, Attended Robot, Studio seats as required\n  - \ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/allocating-licenses-to-tenants\n- [ ] **1.3** Configure SSO for tenant (if using Azure AD / Entra ID per-country):\n  - Check current Admin navigation for external identity provider / SSO configuration \u2014 this has moved\n    across UI releases, so confirm the exact path in the live portal rather than relying on a fixed\n    click-path here\n  - Add your external IdP with the correct Tenant ID for that country's AD\n- [ ] **1.4** Create Folder structure:\n  - Follow naming convention: `<Country>/<BU>/<Environment>`\n  - e.g., `SG/Finance/Production`\n- [ ] **1.5** Create Machine Templates for the tenant's Robot machines\n- [ ] **1.6** Add Robot user accounts (Directory or Local)\n- [ ] **1.7** Configure credential store (see below)\n- [ ] **1.8** Upload packages / create processes\n- [ ] **1.9** Test end-to-end Robot connectivity and job execution\n\n### Tenant Isolation Considerations\n\n| Setting | Recommendation |\n|---|---|\n| Folder permissions | Scope strictly to tenant's own folders |\n| Credential stores | Configure per-tenant (not shared across tenants) \u2014 **this matters even for the same third-party vault**: UiPath's own CyberArk CCP docs warn that a CyberArk store configured in multiple tenants with the *same* App ID, Safe, and Folder Name will permit cross-tenant access to the same stored credentials. Use distinct App ID/Safe/Folder combinations per tenant. \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#cyberark-ccp |\n| Packages | Use separate feeds per tenant or folder-level access control |\n| SSO | Per-country identity provider tenants if different domains |\n| Robots | Machine templates scoped to tenant folders |\n\n---\n\n## Credential Store Setup Guides\n\n> Third-party credential stores (Azure Key Vault, CyberArk, HashiCorp Vault, BeyondTrust, etc.) require\n> **Enterprise \u2013 Advanced** (Flex Pricing) or **Enterprise / Application Test Enterprise** (Unified\n> Pricing) licensing. \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores\n>\n> Real navigation to add any store: **Orchestrator \u2192 (Tenant context) \u2192 Credentials \u2192 Stores tab \u2192\n> \"Add credential store\"** \u2192 pick a **Type** in the dialog. \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#creating-a-credential-store\n\n### Option 1 \u2014 Azure Key Vault (Most Common for Cloud)\n\n**Required Azure permissions for the SPN/App Registration:**\n\nConfirmed against UiPath docs \u2014 Azure Key Vault credential stores use Azure RBAC authentication, and\nthe role assigned to the service principal depends on store type:\n\n| Mode | Required Azure RBAC Role |\n|---|---|\n| Read-Only (`Azure Key Vault (read-only)` store type) | **Key Vault Secrets User** |\n| Read-Write (`Azure Key Vault` store type) | **Key Vault Secrets Officer** |\n\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/integrating-credential-stores#azure-key-vault-integration\n\n**Azure Setup:**\n```\n1. Azure Portal \u2192 App Registrations \u2192 New Registration\n2. Note: Application (Client) ID\n3. Create Client Secret (Manage \u2192 Certificates & Secrets \u2192 New client secret)\n   \u2192 Note the secret Value immediately (only shown once)\n4. Azure Portal \u2192 Key Vaults \u2192 [Your Vault] \u2192 Overview\n   \u2192 Copy Vault URI and Directory ID for later use\n5. Access Control (IAM) \u2192 Add \u2192 Add role assignment\n   \u2192 Role: \"Key Vault Secrets Officer\" (for the read-write store)\n      OR \"Key Vault Secrets User\" (for the read-only store)\n   \u2192 Assign the role to the service principal of your App Registration\n   \u2192 Review + assign\n```\n*(No redirect URI is required for this flow \u2014 Key Vault access uses the app registration's client\ncredentials, not an interactive OAuth redirect. The original draft's \"callback\" redirect URI step was\nnot found in UiPath or Microsoft documentation and has been removed as unverifiable.)*\n\n**Orchestrator Setup:**\n```\n1. Orchestrator \u2192 Tenant \u2192 Credentials \u2192 Stores tab \u2192 Add credential store\n2. Type: Azure Key Vault (read-write) OR Azure Key Vault (read-only)\n3. Name: <descriptive name for this store>\n4. Key Vault Uri: https://<vault-name>.vault.azure.net/\n5. Directory ID: <Directory/Tenant ID from the Key Vault Overview page>\n6. Client Id: <Application (Client) ID from Azure AD App Registration>\n7. Client Secret: <Secret value>\n8. Select Create \u2014 Orchestrator validates and creates the store\n```\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#azure-key-vault\n\n**Validate SPN connectivity (PowerShell):**\n\n*This is a generic Azure AD client-credentials check, not a UiPath-published script \u2014 use it as a\nstarting point for connectivity troubleshooting, not as an official UiPath procedure.*\n```powershell\n$tenantId = \"<azure-tenant-id>\"\n$clientId = \"<app-registration-client-id>\"\n$clientSecret = \"<client-secret>\"\n$vaultName = \"<key-vault-name>\"\n\n$tokenResponse = Invoke-WebRequest -Method Post `\n  -Uri \"https://login.microsoftonline.com/$tenantId/oauth2/token\" `\n  -ContentType \"application/x-www-form-urlencoded\" `\n  -Body \"grant_type=client_credentials&client_id=$clientId&client_secret=$clientSecret&resource=https://vault.azure.net\"\n\n$token = ($tokenResponse.Content | ConvertFrom-Json).access_token\nWrite-Host \"Token obtained: $($token.Substring(0,20))...\"\n\n# Test listing secrets\n$secrets = Invoke-WebRequest -Method Get `\n  -Uri \"https://$vaultName.vault.azure.net/secrets?api-version=7.3\" `\n  -Headers @{ \"Authorization\" = \"Bearer $token\" }\nWrite-Host \"Secrets accessible: $(($secrets.Content | ConvertFrom-Json).value.Count)\"\n```\n\n---\n\n### Option 2 \u2014 CyberArk CCP (Credential Provider)\n\n**Architecture:**\n```\nRobot \u2192 Orchestrator \u2192 CyberArk CCP REST API (AIMWebService) \u2192 CyberArk Vault\n```\n\n**Prerequisites (confirmed):**\n- Network connectivity between the Orchestrator service and the CyberArk CCP server\n- CyberArk Central Credential Provider installed on a machine that allows HTTP connections\n- CyberArk Enterprise Password Vault\n- An Orchestrator \"application\" created in CyberArk PVWA (Applications tab \u2192 Add Application),\n  authenticated via client certificate (2048-bit minimum)\n- A Safe created in PVWA with the Orchestrator application added as a Safe member with\n  **View Safe Members**, **Retrieve accounts**, **List accounts** permissions\n\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/integrating-credential-stores#cyberark-ccp-integration\n\n**Orchestrator Setup (Automation Cloud) \u2014 actual field names:**\n```\n1. Orchestrator \u2192 Tenant \u2192 Credentials \u2192 Stores tab \u2192 Add credential store\n2. Type: CyberArk CCP\n3. Name: <descriptive name for this store>\n4. App ID: <Application ID configured in CyberArk PVWA>\n5. CyberArk Safe: <Safe name defined in PVWA>\n6. CyberArk Folder: <folder within the Safe where credentials live>\n7. Central Credential Provider URL: <address of your CCP server>\n8. Web Service Name: (optional \u2014 defaults to AIMWebService if left blank)\n9. Client Certificate / Client Certificate Password: (for mutual TLS auth)\n10. Server Root Certificate: (only needed if CCP's AIMWebService uses a self-signed root CA)\n11. Select Create\n```\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#cyberark-ccp\n\n**CyberArk Errors you may see (verified against CyberArk's Application Provider Messages reference):**\n\n> The error *codes* below are real CyberArk Credential Provider messages. The original draft of this\n> KB had paired them with the wrong causes \u2014 corrected here against CyberArk's own documentation.\n\n| Error | Actual CyberArk-documented cause | Fix |\n|---|---|---|\n| `APPAP004E` \u2014 Password object in Safe/folder was not found | The requested password object doesn't exist in that Safe/folder, **or** the application/Credential Provider user lacks permission for that specific password | Confirm the object exists in the exact Safe + folder queried; verify the App ID's account has retrieve rights on it |\n| `APPAP007E` \u2014 Connection to the backend/Vault has failed | Network/communication error or timeout reaching the Vault (e.g. `ITACM012S` timeout, `ITACM022S` unable to connect) | Check network/firewall path from Orchestrator/CCP to the CyberArk Vault; confirm the Vault and CCP service are reachable and up |\n| `APPAP008E` \u2014 Problem using the application user in the Vault | The application user is disabled, expired, connecting from an unauthorized/suspended network area, outside its permitted time slice, or has the wrong User Type (must be `AIMAccount`) | Enable/un-expire the App ID, verify the Orchestrator server's IP is in an allowed network area, confirm User Type = AIMAccount |\n| SSL certificate error | CyberArk CCP cert not trusted by Orchestrator | Import the CyberArk CCP (AIMWebService) certificate into the Orchestrator server's trust store, or configure the **Server Root Certificate** field if self-signed |\n| Connection timeout | CyberArk CCP not reachable | Check firewall/network path from Orchestrator to the CCP server |\n\n\ud83d\udcd6 https://docs.cyberark.com/credential-providers/latest/en/content/messages/application%20provider%20messages%20-%20general.htm\n\n---\n\n### Option 3 \u2014 HashiCorp Vault\n\n**Prerequisites:**\n- HashiCorp Vault server accessible from Orchestrator \u2014 API port (**8200** in a typical install) open\n  through any firewall between Orchestrator and the Vault server\n- A configured secrets engine (see options below)\n- An authentication method configured for Orchestrator to use\n\n**Orchestrator Setup \u2014 actual field names:**\n```\n1. Orchestrator \u2192 Tenant \u2192 Credentials \u2192 Stores tab \u2192 Add credential store\n2. Type: HashiCorp Vault (read-write) OR HashiCorp Vault (read-only)\n3. Name: <descriptive name>\n4. Vault Uri: https://<vault-server>:8200  (address of Vault's HTTP API)\n5. Authentication Type \u2014 pick one:\n   - AppRole (recommended) \u2192 Role Id + Secret Id\n   - UsernamePassword \u2192 Username + Password\n   - Ldap \u2192 Username + Password (+ optional \"Use Dynamic Credentials\" toggle)\n   - Token \u2192 Token\n6. Secrets Engine: KeyValueV1, KeyValueV2, ActiveDirectory, OpenLDAP, or LDAP\n   (ActiveDirectory/OpenLDAP available only for the read-only store)\n7. Secrets Engine Mount Path (defaults to kv / kv-v2 / ad depending on engine)\n8. Data Path: path prefix used for all stored secrets\n9. Authentication Mount Path: optional, only if you mounted auth on a custom path\n10. Namespace: optional, HashiCorp Vault Enterprise only\n11. Select Create\n```\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/integrating-credential-stores#hashicorp-vault-integration\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#hashicorp-vault\n\n---\n\n### Option 4 \u2014 BeyondTrust Password Safe\n\n> **Important \u2014 corrected:** the BeyondTrust integration is **read-only**. Orchestrator can retrieve\n> credentials from BeyondTrust but cannot create, update, or delete them there. There is no single\n> generic \"BeyondTrust\" store type, API URL, or API Key field as previously drafted \u2014 the real\n> configuration uses two distinct plugin types with their own fields.\n\n**Orchestrator Setup \u2014 actual field names:**\n```\n1. Orchestrator \u2192 Tenant \u2192 Credentials \u2192 Stores tab \u2192 Add credential store\n2. Type: BeyondTrust Password Safe - Managed Accounts\n     OR: BeyondTrust Password Safe - Team Passwords\n3. Name: <descriptive name>\n4. BeyondTrust Host URL: <URL of your BeyondTrust Password Safe instance>\n5. API Registration Key: <API registration key generated in BeyondTrust>\n6. API Run As Username: <BeyondTrust username the API calls execute as>\n\nIf Managed Accounts:\n7. Default Managed System Name: optional fallback if the asset's External Name has no System Name prefix\n8. System-Account Delimiter: delimiter splitting System Name from Account Name\n9. Managed Account Type: \"system\" (local accounts) or \"domainlinked\" (domain accounts)\n\nIf Team Passwords:\n7. Folder Path Prefix: optional, prepended to all Orchestrator asset values\n8. Folder/Account Delimiter: splits Path from Title in the Orchestrator asset\n\n10. Select Create\n```\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/integrating-credential-stores#beyondtrust-integration\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#beyondtrust\n\n---\n\n## Using Credential Store Assets\n\nOnce a credential store is configured:\n\n```\nOrchestrator \u2192 Folder \u2192 Assets \u2192 Add Asset\nType: Credential\nCredential Store: [select your configured store]\nExternal Name: <identifier of the secret in the vault>\n```\n\n> **Important:** The External Name is used to locate the secret in the vault (often concatenated with\n> a configured data path). Treat it as needing an **exact match** to what's provisioned in the vault.\n> The previous claim that this is \"case-sensitive for Azure Key Vault, case-insensitive for CyberArk\"\n> could not be verified against current UiPath documentation and has been removed \u2014 case-sensitivity\n> behavior depends on the specific vault/secrets engine and should be confirmed for your store type\n> rather than assumed. \ud83d\udcd6 https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores\n\nIn Robot process (Studio):\n```\nGet Asset activity \u2192 Asset Name: \"MyCredentialAsset\"\n\u2192 Returns username + password from the vault at runtime\n\u2192 Credentials are never cached locally on the Robot machine\n```\n\n---\n\n## Dedicated Automation Cloud (Private Cloud) \u2014 Migration Notes\n\n> **Correction:** the original draft's specific DNS-zone and sequencing steps for this section could\n> not be verified against UiPath documentation and have been replaced with verified, general guidance.\n> Also note that **Automation Cloud Private Link** (connecting to the standard multi-tenant Automation\n> Cloud over Azure Private Link, Enterprise plan, with primary/secondary gateways in West Europe /\n> North Europe) and **Automation Cloud Dedicated** (a separate, single-tenant dedicated deployment) are\n> two different offerings \u2014 don't treat them as the same migration path.\n\nFor customers migrating to **Automation Cloud Dedicated** (dedicated/private instance):\n\n- [ ] Engage the UiPath Cloud team early \u2014 dedicated instance provisioning and any private\n      connectivity option is coordinated with UiPath, not self-service\n- [ ] If using Azure Private Link connectivity, work with UiPath to provision the private endpoint(s)\n      on the UiPath side and confirm the approval/connection steps currently documented \u2014 do not rely\n      on a fixed DNS-zone name without confirming it against current docs\n- [ ] Multi-tenant \u2192 Dedicated migration: data migration is performed by the UiPath Cloud team\n      (submit a Support Request / SR)\n- [ ] Robot agents may require updated connection strings/endpoints post-migration \u2014 validate\n      end-to-end connectivity after cutover before decommissioning the old tenant\n\n\ud83d\udcd6 https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/introduction (the standalone Dedicated overview page has been merged into this general \"About Automation Cloud\" page, which now covers Cloud / Public Sector / Dedicated together \u2014 re-confirm Dedicated-specific details here going forward)\n\n**General sequencing guidance (verify exact steps live with UiPath before executing):**\n```\n1. Customer/UiPath jointly scope the private connectivity requirement (Private Link vs Dedicated)\n2. Customer provisions any required Azure-side resources (e.g., Private Endpoint) per current\n   UiPath guidance for the chosen option\n3. UiPath approves/completes the connection on their side\n4. Customer validates DNS resolution and connectivity end-to-end per the current UiPath instructions\n5. Update Robot connections/endpoints as instructed and re-test job execution\n```\n\n---\n\n## Troubleshooting Credential Store Issues\n\n```powershell\n# Quick diagnostic: test credential retrieval from Robot machine\n# Run in Studio \u2192 Debug mode with Get Asset activity\n# Check Robot logs for credential fetch errors:\nGet-Content \"$env:LOCALAPPDATA\\UiPath\\Logs\\*\" | Select-String \"credential|asset|vault|CyberArk|KeyVault\" | Select-Object -Last 50\n```\n\n**Common cross-credential-store errors:**\n\n| Error | Likely Cause |\n|---|---|\n| `Credential store connection failed` | Network/firewall blocking Orchestrator \u2192 Vault |\n| `Invalid credentials` | Client Secret expired (AKV) or token/AppRole credentials expired (HashiCorp Vault) |\n| `External name not found` | Secret name/path mismatch \u2014 check exact spelling and any configured Data Path prefix |\n| `Permission denied` | SPN/App lacks `Set` (Key Vault Secrets Officer) permission for read-write mode, or CyberArk Safe access is missing |\n| Works in Read-Only, fails in Read-Write | SPN only has the **Key Vault Secrets User** role \u2014 needs **Key Vault Secrets Officer** for a read-write store |\n\n---\n\n## Reference Links\n\n- Azure Key Vault integration (prerequisites/setup): https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/integrating-credential-stores#azure-key-vault-integration\n- Azure Key Vault store fields (Orchestrator UI): https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#azure-key-vault\n- CyberArk CCP integration (prerequisites/setup): https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/integrating-credential-stores#cyberark-ccp-integration\n- CyberArk CCP store fields (Orchestrator UI): https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#cyberark-ccp\n- CyberArk Application Provider error messages (source of truth for APPAP*** codes): https://docs.cyberark.com/credential-providers/latest/en/content/messages/application%20provider%20messages%20-%20general.htm\n- HashiCorp Vault integration: https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/integrating-credential-stores#hashicorp-vault-integration\n- HashiCorp Vault store fields (Orchestrator UI): https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#hashicorp-vault\n- BeyondTrust integration: https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/integrating-credential-stores#beyondtrust-integration\n- BeyondTrust store fields (Orchestrator UI): https://docs.uipath.com/orchestrator/automation-cloud/latest/user-guide/managing-credential-stores#beyondtrust\n- Multi-tenancy \u2014 About tenants: https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/about-tenants\n- Multi-tenancy \u2014 Managing/creating tenants: https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/managing-tenants\n- Allocating licenses to tenants: https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/allocating-licenses-to-tenants\n- Automation Cloud Dedicated overview (merged into the general About page): https://docs.uipath.com/automation-cloud/automation-cloud/latest/admin-guide/introduction\n",
  folders: "# Orchestrator \u2014 Migrating Classic Folders to Modern Folders\n\n## Scope\nMigrating an existing Standalone or Automation Cloud tenant from Classic folders (environment-based,\nmanually managed users/robots) to Modern folders (hierarchical, AD-integrated, auto-provisioned).\nCovers the built-in migration wizard, post-migration cleanup, rollback, and the hard removal of\nClassic folders in Orchestrator 2023.10+.\n\n---\n\n## Why This Matters Now\n\nClassic folders are not just deprecated \u2014 they are **removed outright** starting with Orchestrator\n2023.10. Timeline:\n\n- Oct 2021 \u2014 deprecation announced\n- Apr 2022 \u2014 removal announced\n- Oct 2022 \u2014 migration wizard launched\n- Apr 2023 \u2014 executions disabled in classic folders\n- Oct 2023 \u2014 classic folders removed entirely from 2023.10+\n\n**If a customer upgrades to 2023.10+ with any classic objects still in the database, setup stops with:**\n`This Orchestrator version does not support Classic Folders and Classic Robots. Please migrate your\ninstallation to Modern Folders, delete your existing Classic Folders before upgrading.`\n\nSo this is mandatory, not optional, for any pre-2023.10 customer planning to upgrade.\n\n---\n\n## Sequencing With an Orchestrator Upgrade \u2014 When to Migrate\n\n**This is the single most common planning mistake:** treating the classic-to-modern migration as\nsomething you can \"deal with later\" on whatever version you land on. It has a narrow window.\n\n- The migration wizard **first became available in Orchestrator 2022.10** (October 2022 per the\n  timeline above), and is also documented at 2023.4 \u2014 so it exists on-prem from 2022.10 through\n  2023.4.\n- **Classic folder executions are disabled starting 2023.4** \u2014 automations in classic folders stop\n  running the moment you're on 2023.4, whether or not you've migrated yet.\n- **Classic folders are removed entirely starting 2023.10** \u2014 you cannot even get an upgrade to\n  2023.10+ to complete if classic objects still exist in the database (setup stops with the error\n  quoted above), and 2023.10+ has no UI path to migrate them since the classic-folder feature\n  itself is gone.\n\n**Practical implication for a customer currently below 2022.10 (e.g. 2021.10 or 2022.4) planning a\nmulti-hop upgrade to 2023.10+ or later:** don't jump straight to the final target. Recommended\nsequencing:\n\n1. Upgrade to **2022.10 first** (not straight to 2023.4/2023.10+).\n2. While on 2022.10 \u2014 or at the latest, immediately upon reaching 2023.4 before automations are\n   needed again \u2014 run the Classic-to-Modern migration wizard (Step-by-Step Migration Checklist\n   below) and delete the remaining classic folders.\n3. **Only then** continue the upgrade chain onward (2022.10 \u2192 2023.4 \u2192 2023.10 \u2192 ... \u2192 final\n   target), per the LTS-chain rules in `references/standalone-upgrade.md`.\n\nSkipping straight from a pre-2022.10 version to 2023.10+ leaves you stuck: the target version\nblocks the upgrade on remaining classic objects, but that version no longer has the migration\nwizard needed to fix it forward \u2014 you'd have to step back down to an intermediate version with the\nwizard available, migrate there, then re-attempt the upgrade.\n\n**How to verify with certainty whether classic folders still exist**, rather than relying on the\ncustomer's memory \u2014 run this directly against the Orchestrator database:\n\n```sql\nSELECT *\nFROM [dbo].[OrganizationUnits]\nWHERE ProvisionType = 0 AND IsDeleted = 0;\n```\n\n`ProvisionType = 0` marks folders that are not auto-provisioned (i.e. classic-style, manually\nmanaged folders), and `IsDeleted = 0` excludes already-deleted rows. Any rows returned are classic\nfolders still live in the system. This exact `WHERE [IsDeleted] = 0 AND [ProvisionType] = 0` filter\npattern against `[dbo].[OrganizationUnits]` is UiPath's own documented approach to identifying\nthese folder rows (used in their official concurrent-folder-creation upgrade-troubleshooting\nscript), so it's a reliable way to confirm folder state directly rather than by asking the customer.\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2022.4/user-guide/upgrade-issues\n\n\ud83d\udcd6 https://docs.uipath.com/orchestrator/standalone/2022.10/user-guide/migrating-from-classic-folders-to-modern-folders\n\ud83d\udcd6 https://docs.uipath.com/overview/other/latest/overview/classic-folders-removal\n\n---\n\n## Classic vs Modern \u2014 What Changes\n\n| Feature | Classic Folders | Modern Folders |\n|---|---|---|\n| AD as central hub for user info | Available | Available |\n| SSO with AD credentials | Available | Available |\n| Automatic Robot Management | Not available | Available |\n| Automatic License Assignment | Not available | Available |\n| Hierarchical Folder Structure | Not available | Available |\n| Fine-Grained Permissions | Not available | Available |\n| Job Restart | Available | Available |\n| Long-Running Workflows | Available | Available |\n\n---\n\n## Prerequisites Checklist\n\n- [ ] Confirm you are an **organization administrator** in Automation Cloud\n- [ ] Confirm your account has these permissions: Roles (View/Create/Edit), Settings (View/Edit), Users (View/Create/Edit), Robots (View/Create/Edit/Delete), Folders (Create/Edit)\n- [ ] Count classic robots in scope \u2014 **do not use the wizard above ~2,000 classic robots per folder set**; large deployments need a dedicated migration strategy instead\n- [ ] Add yourself to **every classic folder** you want migrated \u2014 folders you're not assigned to are silently skipped\n- [ ] Confirm every robot you want migrated is added to an **environment** \u2014 robots not in any environment are presumed unused and skipped\n- [ ] Review the Automation Users group \u2014 remove elevated roles/extra licenses before migrating, since attended users/robot accounts auto-inherit Automation Users role at folder level post-migration\n- [ ] Confirm attended-robot usernames contain `@` (i.e. are directory users, not local users) \u2014 local users block migration (see Common Errors)\n- [ ] Make sure **no jobs are running** and disable any triggers that might fire during the migration window\n\n---\n\n## Step-by-Step Migration Checklist (Wizard)\n\n### Phase 1 \u2014 Getting Started\n- [ ] **1.1** Go to Tenant \u2192 Settings (opens on the General tab)\n- [ ] **1.2** In the Classic Folders section, click **Start migration** \u2014 opens the Modern migration wizard\n- [ ] **1.3** Review the Summary section, click **Copy the summary above**, and save it for your records\n- [ ] **1.4** Click **Next** to move to the Attended users step\n\n### Phase 2 \u2014 Attended Users\n- [ ] **2.1** For each attended robot found, select the correct **Target user account**\n- [ ] **2.2** For any unmapped/incorrect account: click **Assign** \u2192 search for the user \u2192 **Save**\n- [ ] **2.3** Click **Next** to move to the Unattended users step\n\n### Phase 3 \u2014 Unattended Users\n- [ ] **3.1** Under Bulk Actions, choose how to handle unmapped classic unattended robots \u2014 **Automatically generate robot accounts** (recommended) or **Ignore them** (not recommended)\n- [ ] **3.2** Review the Target robot account column for correctness\n- [ ] **3.3** If you chose \"Ignore them,\" manually map remaining robots via Assign, or create new robot accounts\n- [ ] **3.4** Click **Next** to reach the Finishing page\n\n### Phase 4 \u2014 Execute\n- [ ] **4.1** Click **Execute migration** to start\n- [ ] **4.2** Confirm in the dialog by clicking **Execute**\n- [ ] **4.3** Watch per-folder progress; if any folder fails, read its error message, fix the underlying issue, then restart or retry that folder\n- [ ] **4.4** Click **Close** to exit the wizard once successful\n- [ ] **4.5** Wait ~10 minutes after completion for the wizard to disable robots in migrated classic folders and release licenses back for modern-folder use\n\n---\n\n## Post-Migration Setup (Required \u2014 Not Automatic)\n\nRobots and Environments do **not** need re-provisioning. Everything else below does:\n\n- [ ] Recompile workflows using Orchestrator activities or direct HTTP calls to the Orchestrator API against **UiPath.System.Activities 2019.10+** \u2014 migrated workflows only run on 2019.10+ Robots\n- [ ] Re-provision other entities (e.g. action catalogs) in the corresponding modern folder\n- [ ] Unlink Test Sets from classic folders (delete from the corresponding Test Manager projects)\n- [ ] Re-link Test Sets by selecting the ones marked **[Migrated]** in their description\n- [ ] Update any UiPath Apps referencing the old classic-folder process to point at the migrated modern-folder process\n- [ ] Update workflows using **Start Job** with the old `processName_envName` syntax to just `processName` (modern folders don't use environments)\n- [ ] Enable **interactive sign-in** for the tenant if not already on \u2014 this is mandatory in modern folders\n- [ ] Test unattended processes via Start Job from Orchestrator in the new modern setup\n- [ ] Upgrade end-user workstations to **UiPath Robot 2019.10+**\n- [ ] Remove the now-unused classic folders once everything is validated\n\n---\n\n## Reverting to Classic Folders (Rollback)\n\nIf something goes wrong post-migration and you need to roll back:\n\n- [ ] Set the tenant's robot authentication settings back to **Hybrid**\n- [ ] Re-enable all classic robots\n- [ ] Re-enable triggers in classic folders\n- [ ] Delete the newly created modern folders\n- [ ] Delete the newly created robot accounts\n- [ ] Investigate the root cause in the classic setup before re-attempting\n- [ ] Re-run the migration once the root cause is resolved\n\n---\n\n## Common Errors & Fixes\n\n| Error / Symptom | Cause | Fix |\n|---|---|---|\n| `This Orchestrator version does not support Classic Folders and Classic Robots...` | Upgrading to 2023.10+ with classic objects still present | Migrate all classic folders to modern, delete remaining classic folders, then retry the upgrade |\n| Migration fails related to jobs not reaching final state | A terminated job stayed in `Terminating` instead of reaching `Stopped` | Wait \u2014 after 24h stuck `Terminating` jobs auto-flip to `Stopped`, then restart the migration |\n| Migration fails for Test Data Queues / duplicate items on retry | Partially-migrated data left over from a prior failed attempt | Check **Clean-up before retrying** before restarting the migration |\n| Migration does not succeed for a given attended robot | Robot's username has no `@` \u2014 it's a local user, not a directory user | Convert to a directory user (usually automatic on next login) or run the documented SQL fix against `dbo.Users` / `dbo.UserLogins` |\n| Robot mapping/creation fails for a specific robot | Migrated robot name exceeds the 64-character limit | Manually create the robot account and map it yourself |\n| Robot connects with the wrong/unexpected username after migration | Multiple attended robots were mapped to the same target account \u2014 the wizard picks one username at random | Manually verify and fix the machine connection credentials per robot |\n| Queue trigger can't be edited mid-migration | Editing classic-folder queue triggers is blocked from the moment migration starts until it completes | Wait for migration to finish (or fail/rollback) before editing that trigger |\n\n---\n\n## Reference Links\n\n- Migrating From Classic to Modern Folders: https://docs.uipath.com/orchestrator/standalone/2023.4/user-guide/migrating-from-classic-folders-to-modern-folders\n- Classic Folders Vs Modern Folders: https://docs.uipath.com/orchestrator/standalone/2023.4/user-guide/classic-folders-vs-modern-folders\n- Classic Folders Removal (timeline & 2023.10+ impact): https://docs.uipath.com/overview/other/latest/overview/classic-folders-removal\n"
};

/* ---------- markdown helpers ---------- */
function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function renderInline(s) {
  s = s.replace(/`([^`]+)`/g, (m, c) => '<code>' + c + '</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Convert markdown [text](url) links to placeholders first so the bare-URL
  // autolinker below doesn't re-process URLs that are already inside an href.
  const linkStash = [];
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (m, text, url) => {
    linkStash.push('<a href="' + url + '" target="_blank" rel="noopener">' + text + '</a>');
    return '\u0000LINK' + (linkStash.length - 1) + '\u0000';
  });
  // Autolink any remaining bare URLs (e.g. inline "\ud83d\udcd6 https://docs.uipath.com/...\" citations)
  // so every reference link is clickable, not just markdown-style [text](url) ones.
  s = s.replace(/(https?:\/\/[^\s<>()"']+)/g, (m, url) => {
    let trail = '';
    while (url.length && /[).,;:'"]/.test(url[url.length - 1])) {
      trail = url[url.length - 1] + trail;
      url = url.slice(0, -1);
    }
    return '<a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>' + trail;
  });
  s = s.replace(/\u0000LINK(\d+)\u0000/g, (m, i) => linkStash[parseInt(i, 10)]);
  return s;
}

function iconForSection(title) {
  const t = title.toLowerCase();
  if (t.includes('pre-flight') || t.includes('pre-install') || t.includes('pre-upgrade') || t.includes('decision matrix')) return '🧭';
  if (t.includes('validation')) return '✅';
  if (t.includes('error')) return '🐛';
  if (t.includes('reference link')) return '🔗';

  if (t.includes('vs modern') || t.includes('what changes')) return '🔄';
  if (t.includes('checklist')) return '📋';
  return '📄';
}

// Renders one markdown "line body" (used inside a section) - no H1/H2 splitting, just inline structure.
function renderBody(md) {
  const lines = escapeHtml(md).split('\n');
  let html = '', inCode = false, codeBuf = [], listType = null, tableBuf = [];
  function flushList() { if (listType) { html += '</' + listType + '>'; listType = null; } }
  function flushTable() {
    if (tableBuf.length) {
      const rows = tableBuf.filter(r => !/^\s*\|?\s*-{2,}/.test(r));
      html += '<table>';
      rows.forEach((row, i) => {
        const cells = row.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
        const tag = i === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => '<' + tag + '>' + renderInline(c) + '</' + tag + '>').join('') + '</tr>';
      });
      html += '</table>'; tableBuf = [];
    }
  }
  for (let line of lines) {
    if (/^```/.test(line.trim())) {
      if (inCode) { html += '<pre><code>' + codeBuf.join('\n') + '</code></pre>'; codeBuf = []; inCode = false; }
      else { flushList(); flushTable(); inCode = true; }
      continue;
    }
    if (inCode) { codeBuf.push(line); continue; }
    if (/^\s*\|.*\|\s*$/.test(line)) { flushList(); tableBuf.push(line.trim()); continue; }
    else if (tableBuf.length) { flushTable(); }

    const chk = line.match(/^\s*[-*]\s+\[([ xX])\]\s+(.*)$/);
    if (chk) {
      if (listType !== 'ul-chk') { flushList(); html += '<ul class="chklist">'; listType = 'ul-chk'; }
      const checked = chk[1].toLowerCase() === 'x';
      html += '<li class="chk"><label' + (checked ? ' class="done"' : '') + '><input type="checkbox"' + (checked ? ' checked' : '') + '><span>' + renderInline(chk[2]) + '</span></label></li>';
      continue;
    }
    if (/^\s*#{3}\s+/.test(line)) {
      flushList();
      html += '<h3>' + renderInline(line.replace(/^\s*#{3}\s+/, '')) + '</h3>';
      continue;
    }
    if (/^\s*[-*]\s+/.test(line)) {
      if (listType !== 'ul') { flushList(); html += '<ul>'; listType = 'ul'; }
      html += '<li>' + renderInline(line.replace(/^\s*[-*]\s+/, '')) + '</li>';
      continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      if (listType !== 'ol') { flushList(); html += '<ol>'; listType = 'ol'; }
      html += '<li>' + renderInline(line.replace(/^\s*\d+\.\s+/, '')) + '</li>';
      continue;
    }
    flushList();
    if (line.trim() === '') { /* skip */ }
    else if (/^\s*---+\s*$/.test(line)) { /* skip hr, sections already separated */ }
    else if (/^\s*>\s*/.test(line)) { html += '<p><em>' + renderInline(line.replace(/^\s*>\s*/, '')) + '</em></p>'; }
    else { html += '<p>' + renderInline(line) + '</p>'; }
  }
  flushList(); flushTable();
  return html;
}

// Splits a full reference markdown file into { title, sections: [{title, bodyHtml, checkboxCount}] }
function parseFile(md) {
  const lines = md.split('\n');
  let title = '';
  let sections = [];
  let cur = null;
  let buf = [];
  function pushCur() {
    if (cur) {
      const bodyHtml = renderBody(buf.join('\n'));
      const chkCount = (buf.join('\n').match(/^\s*[-*]\s+\[[ xX]\]/gm) || []).length;
      sections.push({ title: cur, bodyHtml, chkCount });
    }
    buf = [];
  }
  for (const line of lines) {
    const h1 = line.match(/^#\s+(.*)$/);
    const h2 = line.match(/^##\s+(.*)$/);
    if (h1 && !title) { title = h1[1]; continue; }
    if (h2) { pushCur(); cur = h2[1]; continue; }
    if (cur !== null) buf.push(line);
  }
  pushCur();
  return { title, sections };
}

function renderFileBlock(md, opts) {
  const parsed = parseFile(md);
  opts = opts || {};
  let out = '';
  if (opts.showFileTitle) out += '<h3 class="file-title">' + escapeHtml(parsed.title) + '</h3>';
  parsed.sections.forEach((sec, i) => {
    const icon = iconForSection(sec.title);
    const badge = sec.chkCount ? '<span class="badge" data-total="' + sec.chkCount + '">0/' + sec.chkCount + '</span>' : '';
    const openAttr = i < 2 ? ' open' : '';
    out += '<details class="section"' + openAttr + '><summary>' + icon + ' ' + escapeHtml(sec.title) + badge + '<span class="chevron">▶</span></summary><div class="section-body">' + sec.bodyHtml + '</div></details>';
  });
  return out;
}
